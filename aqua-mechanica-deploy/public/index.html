<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aqua Mechanica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Special+Elite&family=Share+Tech+Mono&display=swap');

:root{
  --bg-deep:#171310;
  --panel:#241d17;
  --panel-2:#2c231b;
  --brass:#b8863b;
  --brass-light:#d9a54f;
  --brass-dim:#7a5c28;
  --teal:#4f7a6e;
  --teal-light:#7fb3a2;
  --parchment:#e8dcc0;
  --parchment-dim:#a89878;
  --rust:#9c3b2e;
  --rust-light:#c4574a;
  --ink:#0d0a08;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 50% -10%, #2a2118 0%, var(--bg-deep) 55%);
  background-attachment:fixed;
  color:var(--parchment);
  font-family:'Special Elite', monospace;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:24px;
}

.rivet-frame{
  position:relative;
  border:2px solid var(--brass-dim);
  box-shadow: inset 0 0 0 1px #000, inset 0 0 24px rgba(0,0,0,0.55);
  background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
}
.rivet-frame::before{
  content:"";
  position:absolute; inset:6px;
  border:1px solid rgba(184,134,59,0.35);
  pointer-events:none;
}
.rivet{
  position:absolute;
  width:9px; height:9px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass-dim) 70%, #3a2b12 100%);
  box-shadow:0 1px 1px rgba(0,0,0,0.6);
}
.rv-tl{top:5px;left:5px;} .rv-tr{top:5px;right:5px;}
.rv-bl{bottom:5px;left:5px;} .rv-br{bottom:5px;right:5px;}

#app{ width:min(1100px, 100%); }

/* ===== 타이틀 스크린 ===== */
#title-screen{
  padding:48px 40px 40px;
  text-align:center;
}
.gauge-divider{
  display:flex; align-items:center; justify-content:center; gap:14px;
  margin:0 0 18px;
}
.gauge-divider .line{ height:1px; width:70px; background:linear-gradient(90deg, transparent, var(--brass-dim)); }
.gauge-divider .line.r{ background:linear-gradient(90deg, var(--brass-dim), transparent); }
.gauge-divider .cog{ font-size:14px; color:var(--brass); }

.game-title{
  font-family:'Cinzel', serif;
  font-weight:700;
  font-size:44px;
  letter-spacing:4px;
  color:var(--brass-light);
  text-shadow:0 0 18px rgba(217,165,79,0.25), 0 1px 0 #000;
  margin:0;
}
.game-subtitle{
  font-family:'Special Elite', monospace;
  font-size:14px;
  letter-spacing:6px;
  color:var(--teal-light);
  text-transform:uppercase;
  margin:6px 0 30px;
}
.intro-log{
  max-width:640px;
  margin:0 auto 28px;
  padding:18px 22px;
  background:rgba(0,0,0,0.25);
  border-left:3px solid var(--brass);
  text-align:left;
  font-size:14.5px;
  line-height:1.9;
  color:var(--parchment-dim);
}
.intro-log b{ color:var(--parchment); font-weight:normal; border-bottom:1px dotted var(--brass); }

.btn-brass{
  font-family:'Cinzel', serif;
  font-size:15px;
  letter-spacing:2px;
  color:var(--ink);
  background:linear-gradient(180deg, var(--brass-light), var(--brass) 60%, var(--brass-dim));
  border:1px solid #4a3818;
  padding:12px 34px;
  cursor:pointer;
  box-shadow:0 2px 0 #3a2b12, inset 0 1px 0 rgba(255,255,255,0.35);
  transition:transform 0.1s ease, filter 0.15s ease;
}
.btn-brass:hover{ filter:brightness(1.08); }
.btn-brass:active{ transform:translateY(2px); box-shadow:0 0 0 #3a2b12; }
.btn-brass:disabled{ filter:grayscale(0.6) brightness(0.6); cursor:not-allowed; }

/* ===== 동료 선택 ===== */
#companion-select{ display:none; padding:36px 36px 40px; }
.section-label{
  font-family:'Cinzel', serif;
  font-size:13px;
  letter-spacing:3px;
  color:var(--teal-light);
  text-transform:uppercase;
  text-align:center;
  margin:0 0 22px;
}
.companion-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:18px;
  margin-bottom:26px;
}
.companion-card{
  position:relative;
  background:rgba(0,0,0,0.28);
  border:1px solid var(--brass-dim);
  padding:18px 16px 20px;
  cursor:pointer;
  text-align:left;
  transition:border-color 0.15s ease, background 0.15s ease;
}
.companion-card:hover{ border-color:var(--brass); background:rgba(184,134,59,0.08); }
.companion-card.selected{ border-color:var(--teal-light); box-shadow:0 0 0 1px var(--teal-light) inset; background:rgba(79,122,110,0.14); }
.companion-icon{ font-size:26px; color:var(--brass-light); margin-bottom:8px; }
.companion-name{ font-family:'Cinzel', serif; font-size:16px; color:var(--parchment); margin:0 0 4px; letter-spacing:1px; }
.companion-role{ font-size:11.5px; color:var(--teal-light); letter-spacing:1px; margin:0 0 10px; text-transform:uppercase; }
.companion-desc{ font-size:12.5px; line-height:1.7; color:var(--parchment-dim); margin:0 0 10px; }
.companion-stat{ font-family:'Share Tech Mono', monospace; font-size:11.5px; color:var(--brass-light); }

.select-footer{ display:flex; justify-content:center; }

/* ===== 캐릭터 생성 폼 ===== */
.cc-field{ display:flex; align-items:center; gap:16px; margin-bottom:14px; }
.cc-label{
  width:140px; flex:none; font-size:12.5px; letter-spacing:1px; color:var(--teal-light);
  text-transform:uppercase;
}
.cc-input{
  flex:1; font-family:'Special Elite', monospace; font-size:14px; color:var(--parchment);
  background:rgba(0,0,0,0.28); border:1px solid var(--brass-dim); padding:8px 12px;
}
.cc-input:focus{ outline:none; border-color:var(--brass-light); }

.profile-bar{
  font-family:'Share Tech Mono', monospace; font-size:11.5px; letter-spacing:0.5px;
  color:var(--teal-light); margin-bottom:8px;
}

/* ===== 게임 화면 ===== */
#game-screen{ display:none; }
.game-layout{
  display:grid;
  grid-template-columns:1fr 250px;
  grid-template-rows:auto auto auto auto;
  min-height:520px;
}
.stage{ grid-column:1; grid-row:1; padding:20px 22px 6px; }
.location-banner{
  font-family:'Cinzel', serif; font-size:20px; letter-spacing:2px;
  color:var(--brass-light); margin:0 0 4px;
}
.location-sub{ font-size:12px; color:var(--parchment-dim); letter-spacing:1px; margin:0 0 10px; }
.dock-line{ font-size:14px; color:var(--parchment); margin:0 0 6px; }
.turn-counter{
  display:inline-block;
  font-family:'Share Tech Mono', monospace;
  font-size:11.5px;
  letter-spacing:1px;
  color:var(--teal-light);
  border:1px solid var(--brass-dim);
  padding:3px 10px;
  background:rgba(0,0,0,0.25);
}
.turn-counter b{ color:var(--brass-light); }

.dialogue-log{
  grid-column:1; grid-row:2;
  margin:6px 22px 4px;
  padding:14px 18px;
  background:rgba(0,0,0,0.35);
  border-top:1px solid var(--brass-dim);
  border-bottom:1px solid var(--brass-dim);
  font-size:13.5px; line-height:1.85; color:var(--parchment-dim);
  min-height:70px; max-height:220px; overflow-y:auto;
}
.dialogue-log .speaker{ color:var(--brass-light); font-weight:normal; }

.town-actions{ grid-column:1; grid-row:3; padding:10px 22px; display:flex; flex-direction:column; gap:9px; }
.action-btn{
  text-align:left;
  font-family:'Special Elite', monospace;
  font-size:14px;
  color:var(--parchment);
  background:rgba(0,0,0,0.22);
  border:1px solid var(--brass-dim);
  border-left:3px solid var(--teal);
  padding:11px 16px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.action-btn:hover{ background:rgba(184,134,59,0.1); border-left-color:var(--brass-light); }
.action-btn:disabled{ opacity:0.35; cursor:not-allowed; border-left-color:var(--brass-dim); }
.action-btn .tag{ font-size:11px; color:var(--parchment-dim); }
.sail-btn{ border-left-color:var(--rust-light); }

.minor-actions{ grid-column:1; grid-row:4; padding:2px 22px 20px; display:flex; flex-direction:column; gap:8px; }
.minor-actions .action-btn{ padding:8px 14px; font-size:12.5px; border-left-color:var(--teal-light); }

/* 행동 패널은 모달로 표시된다 (선택한 행동 바로 아래가 아니라 화면 중앙 팝업) */
.panel-box{
  position:fixed; inset:0; z-index:90;
  background:rgba(6,4,2,0.72);
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
.panel-box.open{ display:flex; }
.panel-box-inner{
  max-width:520px; width:100%; max-height:82vh; overflow-y:auto;
  padding:20px 22px;
}
.panel-title{
  font-family:'Cinzel', serif; font-size:13px; letter-spacing:2px;
  color:var(--teal-light); text-transform:uppercase; margin:0 0 10px;
  display:flex; justify-content:space-between; align-items:center;
}
.panel-close{
  font-family:'Special Elite', monospace; font-size:11px; color:var(--parchment-dim);
  cursor:pointer; border:1px solid var(--brass-dim); padding:2px 8px; background:transparent;
}
.market-table{ width:100%; border-collapse:collapse; font-size:12px; }
.market-table th{
  text-align:left; color:var(--teal-light); font-weight:normal; font-size:11px;
  letter-spacing:0.5px; text-transform:uppercase; padding:5px 6px; border-bottom:1px solid var(--brass-dim);
}
.market-table td{ padding:5px 6px; border-bottom:1px solid rgba(122,92,40,0.25); color:var(--parchment-dim); }
.market-table td.name{ color:var(--parchment); }
.market-table td.num{ font-family:'Share Tech Mono', monospace; color:var(--brass-light); text-align:center; }
.qty-stepper{ display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.qty-btn{
  width:28px; height:28px; flex:none; padding:0;
  font-family:'Share Tech Mono', monospace; font-size:15px; line-height:1;
  background:rgba(0,0,0,0.3); border:1px solid var(--brass-dim); color:var(--parchment);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.qty-btn:hover{ border-color:var(--brass-light); }
.qty-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.qty-display{
  min-width:22px; text-align:center;
  font-family:'Share Tech Mono', monospace; font-size:13px; color:var(--brass-light);
}
.mini-btn{
  font-family:'Special Elite', monospace; font-size:11px; padding:3px 9px; cursor:pointer;
  background:rgba(0,0,0,0.25); border:1px solid var(--brass-dim); color:var(--parchment);
}
.mini-btn:hover{ border-color:var(--brass-light); }
.mini-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.mini-btn.sell{ border-color:var(--teal); }

.supply-row{ display:flex; gap:10px; margin-bottom:8px; align-items:center; }

/* 마을 행동 패널 공용 — 라디오형 단일 선택 후 확정 */
.choice-option{
  display:flex; gap:10px; align-items:flex-start;
  border:1px solid var(--brass-dim); padding:9px 11px; margin-bottom:8px;
  cursor:pointer; background:rgba(0,0,0,0.16);
}
.choice-option:has(input:disabled){ opacity:0.4; cursor:not-allowed; }
.choice-option input[type="radio"]{ margin-top:3px; flex:none; }
.choice-option-title{ font-size:12.5px; color:var(--parchment); }
.choice-option-desc{ font-size:11px; color:var(--parchment-dim); margin-top:3px; line-height:1.6; }
.choice-suboptions{ margin:0 0 12px 26px; display:flex; flex-direction:column; gap:6px; }
.choice-subcheck{
  font-size:11.5px; color:var(--parchment-dim); display:flex; align-items:center; gap:7px;
}
.choice-subcheck input:disabled + span{ opacity:0.4; }

.dest-btn{
  width:100%; text-align:left;
  font-family:'Special Elite', monospace; font-size:13.5px; color:var(--parchment);
  background:rgba(0,0,0,0.22); border:1px solid var(--brass-dim); border-left:3px solid var(--brass);
  padding:9px 14px; margin-bottom:8px; cursor:pointer;
  display:flex; justify-content:space-between; align-items:center;
}
.dest-btn:hover{ background:rgba(184,134,59,0.1); border-left-color:var(--brass-light); }
.dest-btn .dist-tag{ font-family:'Share Tech Mono', monospace; font-size:11.5px; color:var(--teal-light); }

.voyage-box{
  grid-column:1; grid-row:3;
  padding:12px 22px;
  display:none;
  flex-direction:column;
  gap:12px;
}
.voyage-box.open{ display:flex; }
.voyage-heading{ font-size:13px; color:var(--parchment-dim); }
.voyage-heading b{ color:var(--brass-light); font-weight:normal; }
.voyage-steps{ display:flex; gap:6px; flex-wrap:wrap; }
.voyage-step{
  width:22px; height:22px; border:1px solid var(--brass-dim);
  display:flex; align-items:center; justify-content:center;
  font-family:'Share Tech Mono', monospace; font-size:10px; color:var(--parchment-dim);
  background:rgba(0,0,0,0.25);
}
.voyage-step.done{ background:var(--brass-dim); color:var(--ink); border-color:var(--brass); }
.voyage-step.current{ border-color:var(--teal-light); color:var(--teal-light); }
.voyage-controls{ display:flex; gap:10px; }
.distress-banner{
  border:1px solid var(--rust);
  border-left:3px solid var(--rust-light);
  background:rgba(156,59,46,0.15);
  color:var(--rust-light);
  padding:10px 14px;
  font-size:13px;
  letter-spacing:0.5px;
}

.stat-panel{
  grid-column:2; grid-row:1 / span 4;
  border-left:2px solid var(--brass-dim);
  padding:20px 16px;
  background:rgba(0,0,0,0.2);
}
.btn-status{
  width:100%; margin-bottom:16px; padding:9px 0; font-size:12px;
}
.cloud-sync-box{
  border:1px solid var(--brass-dim); background:rgba(0,0,0,0.2);
  padding:8px 10px; margin-bottom:14px;
}
.vp-badge{
  text-align:center;
  font-family:'Cinzel', serif; font-size:13px; letter-spacing:2px;
  color:var(--ink);
  background:linear-gradient(180deg, var(--brass-light), var(--brass) 60%, var(--brass-dim));
  border:1px solid #4a3818;
  padding:8px 0;
  margin-bottom:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.3);
}
.vp-badge b{
  font-family:'Share Tech Mono', monospace; font-size:17px; margin-left:6px;
}
.stat-panel h3{
  font-family:'Cinzel', serif; font-size:13px; letter-spacing:2px;
  color:var(--teal-light); text-transform:uppercase; margin:0 0 14px; text-align:center;
}
.gauge-row{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.gauge-dial{ position:relative; width:44px; height:44px; flex:none; }
.gauge-dial svg{ width:100%; height:100%; transform:rotate(-90deg); }
.gauge-dial .val{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Share Tech Mono', monospace; font-size:11px; color:var(--parchment);
}
.gauge-label{ font-size:11px; letter-spacing:1px; color:var(--parchment-dim); text-transform:uppercase; }
.gauge-num{ font-family:'Share Tech Mono', monospace; font-size:15px; color:var(--brass-light); }

.stat-divider{ height:1px; background:var(--brass-dim); opacity:0.5; margin:14px 0; }

.simple-stat{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:7px; color:var(--parchment-dim); }
.simple-stat b{ color:var(--parchment); font-weight:normal; font-family:'Share Tech Mono', monospace; }

.ship-line{ font-size:11.5px; color:var(--parchment-dim); margin-bottom:5px; }
.ship-line b{ color:var(--teal-light); font-weight:normal; }

.cargo-list{ font-size:11px; color:var(--parchment-dim); margin-top:4px; }
.cargo-list div{ display:flex; justify-content:space-between; margin-bottom:3px; }
.cargo-list b{ color:var(--brass-light); font-weight:normal; font-family:'Share Tech Mono', monospace; }

/* ===== 상태/인벤토리 & 손패/보드 & 기록 모달 ===== */
#status-modal-overlay, #hand-modal-overlay, #log-history-overlay{
  position:fixed; inset:0; z-index:100;
  background:rgba(6,4,2,0.72);
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
#status-modal, #hand-modal, #log-history-modal{
  max-width:520px; width:100%; max-height:82vh; overflow-y:auto;
  padding:24px 26px;
}
.status-modal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.status-modal-header h2{
  font-family:'Cinzel', serif; font-size:19px; letter-spacing:2px; color:var(--brass-light); margin:0;
}
.status-block{ margin-bottom:18px; }
.status-block .section-label{ text-align:left; margin:0 0 8px; }
.crew-entry{ margin-bottom:10px; }
.crew-entry .crew-name{ font-size:12.5px; color:var(--parchment); }
.crew-entry .crew-role{ font-size:11px; color:var(--teal-light); }
.crew-entry .crew-skill{ font-size:11px; color:var(--parchment-dim); margin-top:2px; }
.card-inline-list{ font-size:11px; color:var(--parchment-dim); margin:2px 0 10px; line-height:1.7; }

.card-row{
  border:1px solid var(--brass-dim);
  background:rgba(0,0,0,0.2);
  padding:10px 12px;
  margin-bottom:8px;
}
.card-row-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.card-name{ font-size:12.5px; color:var(--parchment); }
.card-type-tag{
  font-family:'Share Tech Mono', monospace; font-size:10px; letter-spacing:0.5px;
  color:var(--teal-light); border:1px solid var(--teal); padding:1px 7px;
}
.card-desc{ font-size:11.5px; color:var(--parchment-dim); line-height:1.6; margin-bottom:8px; }
.card-row-actions{ display:flex; gap:6px; flex-wrap:wrap; }
.card-progress{ font-family:'Share Tech Mono', monospace; font-size:11px; color:var(--brass-light); }

/* ===== 주사위 / 카드 이펙트 오버레이 ===== */
.fx-overlay{
  position:fixed; inset:0; z-index:200;
  display:none; align-items:center; justify-content:center;
  background:rgba(6,4,2,0.6);
  pointer-events:none;
}
.fx-overlay.show{ display:flex; pointer-events:auto; }

.fx-dice-row{ display:flex; align-items:center; gap:18px; }
.fx-die{
  width:64px; height:64px; border-radius:10px; flex:none;
  background:linear-gradient(160deg, #ece0c0, #b9a878);
  border:2px solid var(--brass-dim);
  box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 0 2px rgba(255,255,255,0.18);
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  padding:9px; gap:2px;
  animation: fx-die-spin 0.9s cubic-bezier(0.15,0.65,0.35,1);
}
.fx-die .pip{ width:11px; height:11px; border-radius:50%; background:var(--ink); justify-self:center; align-self:center; }
.fx-die-numeral{
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel', serif; font-size:28px; color:var(--ink);
}
@keyframes fx-die-spin{
  0%{ transform:rotate(0deg) scale(0.5); opacity:0; }
  55%{ transform:rotate(620deg) scale(1.12); opacity:1; }
  100%{ transform:rotate(720deg) scale(1); }
}
.fx-die-total{
  font-family:'Cinzel', serif; font-size:30px; color:var(--brass-light);
  text-shadow:0 0 16px rgba(217,165,79,0.5);
  animation: fx-pop 0.4s ease-out 0.55s both;
}
@keyframes fx-pop{
  0%{ transform:scale(0.3); opacity:0; }
  70%{ transform:scale(1.18); opacity:1; }
  100%{ transform:scale(1); }
}

.fx-roll-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; }
.fx-result-label{
  font-family:'Cinzel', serif; font-size:22px; letter-spacing:1px;
  text-align:center;
  animation: fx-pop 0.4s ease-out 0.75s both;
}

.fx-treasure{
  font-size:68px; line-height:1;
  filter: drop-shadow(0 0 18px rgba(217,165,79,0.55));
  animation: fx-treasure-pop 0.7s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes fx-treasure-pop{
  0%{ transform:scale(0.3) rotate(-10deg); opacity:0; }
  60%{ transform:scale(1.25) rotate(6deg); opacity:1; }
  100%{ transform:scale(1) rotate(0deg); }
}

const PORTS = [

  { id:"코크스 아일랜드", name:"코크스 아일랜드", faction:"증기 제국", desc:"검은 연기 피어오르는 채탄 섬",
    produces:["석탄","스크랩 메탈"], demands:["약초","식수정제기"] },
  { id:"폰테인",       name:"폰테인",       faction:"증기 제국", desc:"철갑 조선소가 늘어선 항만",
    produces:["증기기관부품","스크랩 메탈"], demands:["진주","실크"] },
  { id:"녹스",         name:"녹스",         faction:"증기 제국", desc:"발전소 굴뚝이 하늘을 가리는 공업 도시",
    produces:["증기기관부품","석탄"], demands:["마정석","럼주"] },
  { id:"아이언가드",   name:"아이언가드",   faction:"증기 제국", desc:"국경을 지키는 철갑 요새 도시",
    produces:["스크랩 메탈","무기"], demands:["약초","마정석"] },
  { id:"스팀게이트",   name:"스팀게이트",   faction:"증기 제국", desc:"제국과 자유상인을 잇는 관문 항구",
    produces:["증기기관부품","석탄"], demands:["실크","향신료"] },

  // --- 연금술사 연합 ---
  { id:"포그 해븐",   name:"포그 해븐",   faction:"연금술사 연합", desc:"안개 속 실험탑들의 항구",
    produces:["마정석","약초"], demands:["석탄","스크랩 메탈"] },
  { id:"바이오스",     name:"바이오스",     faction:"연금술사 연합", desc:"약초원과 온실이 펼쳐진 저지대",
    produces:["약초","마정석"], demands:["소금","무기"] },
  { id:"머큐리아",     name:"머큐리아",     faction:"연금술사 연합", desc:"증류탑이 늘어선 연금술 항구",
    produces:["마정석","럼주"], demands:["진주","산호"] },
  { id:"에테르나",     name:"에테르나",     faction:"연금술사 연합", desc:"치유의 온천으로 유명한 요양 도시",
    produces:["약초","식수정제기"], demands:["실크","향신료"] },
  { id:"톡시카",       name:"톡시카",       faction:"연금술사 연합", desc:"금지된 조제법이 오가는 뒷골목 실험지",
    produces:["마정석","약초"], demands:["무기","스크랩 메탈"] },

  // --- 자유 상인 연맹 ---
  { id:"골드 코스트", name:"골드 코스트", faction:"자유 상인 연맹", desc:"환전상과 중개인이 몰리는 자유항",
    produces:["진주","산호"], demands:["증기기관부품","석탄"] },
  { id:"스파이스 베이", name:"스파이스 베이", faction:"자유 상인 연맹", desc:"계절풍이 몰아치는 향신료 항구",
    produces:["향신료","실크"], demands:["약초","무기"] },
  { id:"실크 마리나", name:"실크 마리나", faction:"자유 상인 연맹", desc:"직조 공방이 늘어선 비단길 종착지",
    produces:["실크","향신료"], demands:["마정석","스크랩 메탈"] },
  { id:"펄 리프",     name:"펄 리프",     faction:"자유 상인 연맹", desc:"구릿빛 모래사장의 진주 채취장",
    produces:["진주","산호"], demands:["럼주","소금"] },

  // --- 무법자 & 심해 부족 ---
  { id:"블랙 림",     name:"블랙 림",     faction:"무법자 & 심해 부족", desc:"법 밖의 상인들이 모이는 은신 항구",
    produces:["무기","스크랩 메탈"], demands:["석탄","향신료"] },
  { id:"헌터스 록",   name:"헌터스 록",   faction:"무법자 & 심해 부족", desc:"거친 사냥꾼들의 바위 정박지",
    produces:["소금","무기"], demands:["증기기관부품","약초"] },
  { id:"리바이어던의 턱", name:"리바이어던의 턱", faction:"무법자 & 심해 부족", desc:"심해 균열 위에 지어진 전초지",
    produces:["산호","소금"], demands:["약초","식수정제기"] },
];

const ALL_GOODS = ["석탄","증기기관부품","마정석","약초","실크","향신료","진주","산호","스크랩 메탈","럼주","소금","무기","식수정제기"];

/* =========================================================================
   1-2. 경쟁 상단 & 도시 영향력 — 모든 상단이 공통으로 채우는 영향력 트랙
   ========================================================================= */
const RIVAL_COMPANIES = ["철삭 상회", "심연 무역단", "황금나침반 조합"];

function influenceSlotsForLevel(level){
  return 3 + level * 2; // LV1=5, LV2=7, LV3=9, LV4=11, LV5=13
}

const CITY_STATE = {};
PORTS.forEach(p => {
  CITY_STATE[p.id] = { level: 1, influence: {}, lastPlacedBy: null };
});

/* 그 도시의 수요품(품귀·고가) 중 하나를 임무 자원으로 고른다 */
function pickMissionGood(port){
  return port.demands[Math.floor(Math.random() * port.demands.length)];
}

/* 영향력 마커를 놓는다. 트랙이 가득 차면 즉시 정산한다. */
function placeInfluence(portId, who, amount){
  const state = CITY_STATE[portId];
  if (!state) return;
  const cap = influenceSlotsForLevel(state.level);
  const currentTotal = Object.values(state.influence).reduce((a, b) => a + b, 0);
  if (currentTotal >= cap) return;

  const placed = Math.min(amount, cap - currentTotal);
  state.influence[who] = (state.influence[who] || 0) + placed;
  state.lastPlacedBy = who;

  const newTotal = currentTotal + placed;
  if (newTotal >= cap){
    resolveCityInfluence(portId);
  }
}

/* 트랙이 가득 찼을 때 정산: 최다 마커 상단이 보상 + 임무를 받고, 도시는 다음 단계로 성장한다 */
function resolveCityInfluence(portId){
  const state = CITY_STATE[portId];
  const port = PORTS.find(p => p.id === portId);
  const entries = Object.entries(state.influence);
  if (entries.length === 0) return;

  const maxCount = Math.max(...entries.map(([, v]) => v));
  const tied = entries.filter(([, v]) => v === maxCount).map(([k]) => k);
  const winner = tied.length > 1 ? state.lastPlacedBy : tied[0];
  const level = state.level;

  if (state.influence["player"]){
    player.fame += 5 * level;
  }

  if (winner === "player"){
    const goldReward = 100 * level;
    const vpReward = 5 * level;
    player.gold += goldReward;
    player.vp += vpReward;
    player.influenceWins += 1;

    const missionGood = pickMissionGood(port);
    const missionTarget = 1 + level;
    HAND.push({
      id: `mission_${portId}_${Date.now()}`, name:`${port.name} 지원 임무`, type:"achievement",
      installCost:{ gold:0 },
      desc:`${port.name}에 ${missionGood}을(를) ${missionTarget}개 기부하면 완료되는 임무.`,
      rewardDesc:`완료 보상: 명예 점수(VP) +${3 * level}`,
      rewardGold:0, rewardVP: 3 * level, rewardFaction:null,
      goalGood: missionGood, goalCurrent:0, goalTarget: missionTarget,
      missionPort: portId, rewarded:false,
    });

    log("항구 자치회", `${port.name}의 영향력 경쟁에서 승리했다! 골드 ${goldReward}G, VP +${vpReward}를 얻었고, "${port.name} 지원 임무" 카드를 손패에 얻었다.`);
  } else {
    log("항구 자치회", `${port.name}의 영향력 경쟁에서 ${winner}이(가) 승리했다.`);
  }

  if (level < 5){
    state.level += 1;
    const table = market.getMarket(portId);
    port.produces.forEach(goodName => {
      if (table[goodName]) table[goodName].adjustQty(1);
    });
    log("항해일지", `${port.name}이(가) ${state.level}단계 도시로 성장했다. 특산물 재고가 더 넉넉해졌다.`);
  }
  state.influence = {};
  state.lastPlacedBy = null;
  renderGauges(); renderShipStats(); refreshHandModal();
}

const SEA_WAYPOINTS = {

  "W_남단항로":   { x:560, y:500 },  // 자유 상인 연맹 ↔ 무법자 & 심해 부족
};

const PORT_FACTION_HUB = {
  "증기 제국": ["W_북부해협", "W_중앙항로"],
  "연금술사 연합": ["W_북부해협", "W_중앙항로"],

  "무법자 & 심해 부족": ["W_남단항로"],
};

function euclidDist(a, b){
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}
function pxToTiles(px){
  return Math.max(1, Math.round(px / 55));
}

/* 항구+웨이포인트를 노드로 하는 항로 그래프를 만든다.
   - 같은 세력(대륙/해안선) 항구끼리는 직선 항로로 서로 연결 (육지 안쪽 근해)
   - 각 항구는 자기 대륙과 이어진 원해 웨이포인트에도 연결
   - 웨이포인트끼리는 사슬처럼 이어져 있어, 다른 대륙으로 가려면 이 사슬을 거쳐야 한다
   결과적으로 같은 대륙 안에서는 가깝고, 대륙이 다르면 웨이포인트를 거치느라 더 멀어진다. */
function buildSeaGraph(){
  const graph = {};
  const addEdge = (a, b, dist) => {
    if (!graph[a]) graph[a] = {};
    if (!graph[b]) graph[b] = {};
    if (graph[a][b] === undefined || graph[a][b] > dist) graph[a][b] = dist;
    if (graph[b][a] === undefined || graph[b][a] > dist) graph[b][a] = dist;
  };

  // 같은 세력 항구끼리 직접 연결
  PORTS.forEach(p1 => {
    PORTS.forEach(p2 => {
      if (p1.id === p2.id || p1.faction !== p2.faction) return;
      const dist = pxToTiles(euclidDist(PORT_COORDS[p1.id], PORT_COORDS[p2.id]));
      addEdge(p1.id, p2.id, dist);
    });
  });

  // 각 항구 -> 자기 대륙의 원해 웨이포인트
  PORTS.forEach(p => {
    (PORT_FACTION_HUB[p.faction] || []).forEach(wp => {
      const dist = pxToTiles(euclidDist(PORT_COORDS[p.id], SEA_WAYPOINTS[wp]));
      addEdge(p.id, wp, dist);
    });
  });

  // 웨이포인트 사슬 (원해 항로)
  const wpChain = ["W_북부해협", "W_중앙항로", "W_남단항로"];
  for (let i = 0; i < wpChain.length - 1; i++){
    const dist = pxToTiles(euclidDist(SEA_WAYPOINTS[wpChain[i]], SEA_WAYPOINTS[wpChain[i + 1]]));
    addEdge(wpChain[i], wpChain[i + 1], dist);
  }

  return graph;
}

const SEA_GRAPH = buildSeaGraph();

/* 다익스트라 — 한 항구에서 다른 모든 항구까지의 최단 항로 거리(칸 수)를 계산한다. */
const MIN_VOYAGE_DISTANCE = 4; // 지도 전체에서 가장 짧은 항로가 이 값이 되도록 모든 거리에 같은 오프셋을 더한다
const VOYAGE_DISTANCE_OFFSET = MIN_VOYAGE_DISTANCE - 1; // 원래 그래프의 최단 거리(1칸)를 기준으로 계산한 보정값

function computeDistancesFrom(originId){
  const dist = {};
  const visited = new Set();
  Object.keys(SEA_GRAPH).forEach(node => { dist[node] = Infinity; });
  dist[originId] = 0;

  while (true){
    let current = null;
    let best = Infinity;
    Object.keys(dist).forEach(node => {
      if (!visited.has(node) && dist[node] < best){
        best = dist[node];
        current = node;
      }
    });
    if (current === null) break;
    visited.add(current);

    Object.entries(SEA_GRAPH[current] || {}).forEach(([neighbor, edgeDist]) => {
      const alt = dist[current] + edgeDist;
      if (alt < (dist[neighbor] ?? Infinity)) dist[neighbor] = alt;
    });
  }

  const portDistances = {};
  PORTS.forEach(p => {
    if (p.id !== originId && dist[p.id] !== undefined && dist[p.id] !== Infinity){
      // 최단 항로도 최소 4칸이 되도록 전체 거리에 동일한 오프셋을 더한다 (상대적인 거리차는 그대로 유지).
      portDistances[p.id] = dist[p.id] + VOYAGE_DISTANCE_OFFSET;
    }
  });
  return portDistances;
}

function getDistanceBetween(fromId, toId){
  if (fromId === toId) return 0;
  const distances = computeDistancesFrom(fromId);
  return distances[toId] ?? null;
}

/* =========================================================================
   2. 5x5 시장 매트릭스 — 수량 단계(1~5) x 가격 단계(1~5 -> 10/30/50/70/90G)
   ========================================================================= */
const PRICE_TABLE = { 1:10, 2:30, 3:50, 4:70, 5:90 };
const STOCK_LABELS = { 1:"품절 임박", 2:"부족", 3:"보통", 4:"넉넉", 5:"풍부" };
const STOCK_COLORS = { 1:"var(--rust-light)", 2:"var(--rust-light)", 3:"var(--parchment-dim)", 4:"var(--teal-light)", 5:"var(--teal-light)" };

class TradeGood {
  constructor(name, qtyLevel, priceLevel){
    this.name = name;
    this.qtyLevel = qtyLevel;
    this.priceLevel = priceLevel;
    this.pendingQtyDelta = 0;   // 이번 방문 중 거래로 누적된 변동분 — 다음 마을 도착 시 실제로 반영된다
    this.pendingPriceDelta = 0;
  }
  get quantity(){ return this.qtyLevel; }
  get price(){ return PRICE_TABLE[this.priceLevel]; }
  adjustQty(delta){ this.qtyLevel = Math.min(5, Math.max(1, this.qtyLevel + delta)); }
  adjustPrice(delta){ this.priceLevel = Math.min(5, Math.max(1, this.priceLevel + delta)); }
  commitPending(){
    if (this.pendingQtyDelta !== 0) this.adjustQty(this.pendingQtyDelta);
    if (this.pendingPriceDelta !== 0) this.adjustPrice(this.pendingPriceDelta);
    this.pendingQtyDelta = 0;
    this.pendingPriceDelta = 0;
  }
}

class Market {
  constructor(ports){
    this.ports = ports;
    this.matrices = {};
    ports.forEach(p => this._generatePortMarket(p));
  }

  _generatePortMarket(port){
    const table = {};
    ALL_GOODS.forEach(good => {
      let qtyLevel, priceLevel;
      if (port.produces.includes(good)) {
        qtyLevel = 4 + Math.round(Math.random());
        priceLevel = 1 + Math.round(Math.random());
      } else if (port.demands.includes(good)) {
        qtyLevel = 1 + Math.round(Math.random());
        priceLevel = 4 + Math.round(Math.random());
      } else {
        qtyLevel = 2 + Math.floor(Math.random()*3);
        priceLevel = 2 + Math.floor(Math.random()*3);
      }
      table[good] = new TradeGood(good, qtyLevel, priceLevel);
    });
    this.matrices[port.id] = table;
  }

  getMarket(portId){ return this.matrices[portId]; }

  /* 구매: 지정한 수량만큼 한 번에 매수한다. 가격은 거래 전 시세로 총액을 계산한다.
     재고/가격 단계 변동은 즉시 적용되지 않고, 다음 마을 도착 시에 반영된다
     (그래야 같은 방문 안에서 사자마자 오른 값에 되팔아 차익을 남기는 게 불가능해진다). */
  buy(portId, goodName, amount, player, ship){
    const good = this.matrices[portId][goodName];
    amount = Math.max(1, Math.floor(amount) || 1);

    if (good.qtyLevel <= 1) return { ok:false, reason:"이 항구엔 더 이상 재고가 없다." };
    const spaceLeft = ship.cargoSlots - ship.cargoUsed;
    if (spaceLeft <= 0) return { ok:false, reason:"화물칸이 가득 찼다." };
    if (amount > spaceLeft) amount = spaceLeft;

    const unitPrice = good.price;
    const totalCost = unitPrice * amount;
    if (player.gold < totalCost){
      amount = Math.floor(player.gold / unitPrice);
      if (amount <= 0) return { ok:false, reason:"골드가 부족하다." };
    }
    const cost = unitPrice * amount;

    player.gold -= cost;
    good.pendingQtyDelta -= 1;
    good.pendingPriceDelta += 1;
    ship.cargo[goodName] = (ship.cargo[goodName] || 0) + amount;
    ship.cargoUsed += amount;
    ship.cargoCost[goodName] = (ship.cargoCost[goodName] || 0) + cost;
    return { ok:true, cost, amount, unitPrice };
  }

  /* 판매: 지정한 수량만큼 한 번에 매도한다. 가격은 거래 전 시세로 총액을 계산한다.
     재고/가격 단계 변동은 다음 마을 도착 시에 반영된다. */
  sell(portId, goodName, amount, player, ship){
    const holding = ship.cargo[goodName] || 0;
    if (holding <= 0) return { ok:false, reason:"보유한 화물이 없다." };
    amount = Math.max(1, Math.floor(amount) || 1);
    if (amount > holding) amount = holding;

    const good = this.matrices[portId][goodName];
    const unitPrice = good.price;
    const revenue = unitPrice * amount;

    player.gold += revenue;
    good.pendingQtyDelta += 1;
    good.pendingPriceDelta -= 1;
    const prevCost = ship.cargoCost[goodName] || 0;
    ship.cargoCost[goodName] = Math.max(0, Math.round(prevCost * (1 - amount / holding)));
    ship.cargo[goodName] = holding - amount;
    if (ship.cargo[goodName] <= 0){ delete ship.cargo[goodName]; delete ship.cargoCost[goodName]; }
    ship.cargoUsed -= amount;
    return { ok:true, revenue, amount, unitPrice };
  }

  /* 모든 항구의 대기 중인 시세 변동을 실제로 반영한다 — 마을에 새로 도착할 때 호출 */
  commitAllPending(){
    Object.values(this.matrices).forEach(table => {
      Object.values(table).forEach(good => good.commitPending());
    });
  }
}

let RARE_ITEM_INVENTORY = []; // 개인 보관함 — 화물칸과 무관하게 카드 형태로 보관
let DISCOVERED_ITEMS = [];    // 도감에 기록된(한 번이라도 발견한) 아이템 id 목록

function rollRareItem(){
  const r = Math.random();
  let pool;
  if (r < 0.60) pool = RARE_ITEMS.filter(i => i.tier === "유물");       // 5% 중 60% = 3.0%
  else if (r < 0.90) pool = RARE_ITEMS.filter(i => i.tier === "보석");  // 5% 중 30% = 1.5%
  else pool = RARE_ITEMS.filter(i => i.tier === "무구");                // 5% 중 10% = 0.5%
  return pool[Math.floor(Math.random() * pool.length)];
}

function markItemDiscovered(id){
  if (!DISCOVERED_ITEMS.includes(id)) DISCOVERED_ITEMS.push(id);
}

/* 보물상자 카드 개봉 — 50% 자원 / 45% 무역품 / 5% 레어 아이템 */
function rollTreasureChestLoot(){
  const roll = Math.random();
  if (roll < 0.5){
    const options = ["gold", "fuel", "food"];
    const pick = options[Math.floor(Math.random() * options.length)];
    if (pick === "gold"){ const amt = 20 + Math.floor(Math.random() * 30); player.gold += amt; return `골드 ${amt}G`; }
    if (pick === "fuel"){ const amt = 1 + Math.floor(Math.random() * 2); player.fuel += amt; return `연료 ${amt}`; }
    const amt = 1 + Math.floor(Math.random() * 2); player.food += amt; return `식량 ${amt}`;
  } else if (roll < 0.95){
    const good = ALL_GOODS[Math.floor(Math.random() * ALL_GOODS.length)];
    if (ship.cargoUsed < ship.cargoSlots){
      ship.cargo[good] = (ship.cargo[good] || 0) + 1;
      ship.cargoUsed += 1;
      return `무역품 [${good}] 1개`;
    }
    player.gold += 30;
    return `화물칸이 가득 차 대신 30G`;
  } else {
    const item = rollRareItem();
    RARE_ITEM_INVENTORY.push({ ...item, uid: Date.now() + Math.random() });
    markItemDiscovered(item.id);
    return `레어 아이템 [${item.name}] (${item.tier})`;
  }
}

function buildCTierRoster(){
  const roster = [];
  let idx = 0;
  outer:
  for (let i = 0; i < C_TIER_PREFIXES.length; i++){
    for (let j = 0; j < C_TIER_ROLES.length; j++){
      if (roster.length >= 37) break outer;
      const name = `${C_TIER_PREFIXES[i]} ${C_TIER_ROLES[j]}`;
      const effect = C_TIER_EFFECT_POOL[idx % C_TIER_EFFECT_POOL.length];
      const useFame = idx % 2 === 0;
      const threshold = 5 + (idx % 8) * 5; // 5,10,15,...,40
      roster.push({
        id:`c_tier_${idx}`, tier:"C", icon:"&#9875;", name, role:"선원",
        condition: useFame ? (p => p.fame >= threshold) : (p => p.notoriety >= threshold),
        conditionLabel: useFame ? `명성 ${threshold} 이상` : `악명 ${threshold} 이상`,
        recruitCost: 20 + (idx % 6) * 10,
        stat:`패시브: ${effect.label}`,
        effects:[{ type:effect.type, value:effect.value }],
        active:{ label:"잡일 돕기", cost:"무료", effectType:"restore_fuel", effectValue:1, goldCost:0, desc:"연료 1을 채운다." },
      });
      idx++;
    }
  }
  return roster;
}

function getElementByYear(year){
  const d = ((year % 10) + 10) % 10;
  if (d === 4 || d === 5) return "wood";
  if (d === 6 || d === 7) return "fire";
  if (d === 8 || d === 9) return "earth";
  if (d === 0 || d === 1) return "metal";
  return "water"; // 2, 3
}

function getZodiac(month, day){
  for (const z of ZODIAC_TABLE){
    const [fm, fd] = z.from, [tm, td] = z.to;
    if (fm <= tm){
      if ((month > fm || (month === fm && day >= fd)) && (month < tm || (month === tm && day <= td))) return z;
    } else {
      if ((month === fm && day >= fd) || (month === tm && day <= td)) return z;
    }
  }
  return ZODIAC_TABLE[0];
}

function applyCharacterBonuses(elementKey, zodiacGroup){
  if (elementKey === "wood"){
    player.food += 5;
    player.woodDiscount = true; // 무역품 구매가 10% 할인
  } else if (elementKey === "fire"){
    player.combatDiceBonus = (player.combatDiceBonus || 0) + 1;
    player.fuel += 3;
  } else if (elementKey === "earth"){
    player.gold += 200;
    Object.keys(player.reputation).forEach(k => { player.reputation[k] += 5; });
  } else if (elementKey === "metal"){
    ship.tracks.cargo = 2;
    ship.cargoSlots = cargoSlotsForLevel(2);
  } else if (elementKey === "water"){
    player.waterFuelSaveChance = 0.3;
    DECK.push({ id:"rare_ether_current", name:"에테르 해류", type:"buff",
      desc:"강력한 에테르 해류를 타고 순식간에 나아간다. 연료와 식량 소모가 모두 없다." });
  }

  if (zodiacGroup === "fire"){
    player.notoriety += 10;
    player.combatGreatSuccessThreshold = 10;
  } else if (zodiacGroup === "earth"){
    ship.cargoSlots += 1;
    player.shipyardDiscount = 0.2;
  } else if (zodiacGroup === "air"){
    player.fame += 10;
    player.infoChoiceMode = true;
  } else if (zodiacGroup === "water"){
    player.firstDistressFree = true;
    player.recruitDiscount = 0.2;
  }
}

}

function gaugeSVG(pct, color){
  const r = 18, c = 2*Math.PI*r;
  const offset = c * (1 - Math.max(0, Math.min(1, pct)));
  return `<svg viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="${r}" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="4"></circle>
    <circle cx="22" cy="22" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"></circle>
  </svg>`;
}

/* 명성/악명이 20 단위를 넘길 때마다 카드 1장 + VP를 얻는다 */
function checkFameNotorietyThresholds(){
  const STEP = 20;
  if (player.fameThresholdReached === undefined) player.fameThresholdReached = 0;
  if (player.notorietyThresholdReached === undefined) player.notorietyThresholdReached = 0;

  while (player.fame >= player.fameThresholdReached + STEP){
    player.fameThresholdReached += STEP;
    grantThresholdReward("명성");
  }
  while (player.notoriety >= player.notorietyThresholdReached + STEP){
    player.notorietyThresholdReached += STEP;
    grantThresholdReward("악명");
  }
}

function grantThresholdReward(kind){
  player.vp += 5;
  const card = GENERAL_CARD_POOL[Math.floor(Math.random() * GENERAL_CARD_POOL.length)];
  HAND.push({ ...card, id: card.id + "_" + Date.now() });
  log("항해일지", `${kind}이(가) 새로운 경지에 올랐다! 카드 [${card.name}]을(를) 얻고 VP +5를 얻었다.`);
}

const DIE_FACE_PIPS = {
  1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8],
};
function buildDieHTML(value){
  if (value > 6){
    return `<div class="fx-die fx-die-numeral">${value}</div>`;
  }
  let pips = "";
  for (let i = 0; i < 9; i++){
    const lit = DIE_FACE_PIPS[value].includes(i);
    pips += `<div class="pip" style="opacity:${lit ? 1 : 0};"></div>`;
  }
  return `<div class="fx-die">${pips}</div>`;
}

/* 2D6 등 실제 주사위 눈금을 보여주는 이펙트 (예: 전투 판정) */
function showDiceRollEffect(values, totalLabel, resultLabel, resultColor, onDone){
  const overlay = document.getElementById("fx-overlay");
  overlay.innerHTML = `
    <div class="fx-roll-wrap">
      <div class="fx-dice-row">
        ${values.map(v => buildDieHTML(v)).join("")}
        ${totalLabel ? `<div class="fx-die-total">${totalLabel}</div>` : ""}
      </div>
      ${resultLabel ? `<div class="fx-result-label" style="color:${resultColor || "var(--brass-light)"};">${resultLabel}</div>` : ""}
    </div>
  `;
  overlay.classList.add("show");
  setTimeout(() => {

    if (onDone) onDone();

}

/* ===== 이번 턴 행동 되돌리기 (턴당 1회) ===== */
function takeTurnSnapshot(){
  turnStartSnapshot = JSON.parse(JSON.stringify({
    player, ship, HAND, BOARD, DECK, marketMatrices: market.matrices,
  }));
  turnUndoUsed = false;
}

function undoTurnActions(){
  if (!turnStartSnapshot) return;
  if (turnUndoUsed){
    log("항해일지", "이번 턴엔 이미 되돌리기를 사용했다.");
    return;
  }
  const snap = turnStartSnapshot;

  Object.assign(player, snap.player);

  ship.cargoSlots = snap.ship.cargoSlots;
  ship.cargoUsed = snap.ship.cargoUsed;
  ship.crewSlots = snap.ship.crewSlots;
  ship.crewUsed = snap.ship.crewUsed;
  ship.cargo = snap.ship.cargo;
  ship.crew = snap.ship.crew;
  ship.tracks = snap.ship.tracks;
  ship.hullDamage = snap.ship.hullDamage;

  HAND.length = 0; snap.HAND.forEach(c => HAND.push(c));
  BOARD.length = 0; snap.BOARD.forEach(c => BOARD.push(c));
  DECK.length = 0; snap.DECK.forEach(c => DECK.push(c));

  Object.keys(snap.marketMatrices).forEach(portId => {
    if (!market.matrices[portId]) return;
    Object.keys(snap.marketMatrices[portId]).forEach(goodName => {
      const g = snap.marketMatrices[portId][goodName];
      market.matrices[portId][goodName] = new TradeGood(goodName, g.qtyLevel, g.priceLevel);
    });
  });

  turnActionsUsed = 0;
  actionCharged = false;
  turnUndoUsed = true;

  closePanel();
  renderPortInfo();
  renderGauges();
  renderShipStats();
  renderTurnCounter();
  renderTownActions();
  renderMinorActions();
  log("항해일지", "이번 턴에 한 모든 행동을 되돌렸다.");
}

function resLabel(k){ return k === "gold" ? "골드" : k === "fuel" ? "연료" : "식량"; }

/* --- 자원 갈기 --- */
function openGrindPanel(){
  activePanel = "grind";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "카드 판매 — 손패 카드 1장 소모";
  renderGrindPanel();
}
function renderGrindPanel(){
  const body = document.getElementById("panel-body");
  if (HAND.length === 0){
    body.innerHTML = `<div style="font-size:13px;color:var(--parchment-dim);">손패에 갈아 쓸 카드가 없다.</div>`;
    return;
  }
  body.innerHTML = HAND.map((c, i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(122,92,40,0.25);">
      <span style="font-size:12.5px;">${c.name}</span>
      <span>
        <button class="mini-btn" data-idx="${i}" data-res="fuel">연료 +1</button>
        <button class="mini-btn sell" data-idx="${i}" data-res="food">식량 +1</button>
      </span>
    </div>
  `).join("");
  body.querySelectorAll(".mini-btn").forEach(btn => {
    btn.addEventListener("click", () => grindCard(parseInt(btn.dataset.idx, 10), btn.dataset.res));
  });
}
function grindCard(idx, res){
  const card = HAND.splice(idx, 1)[0];
  if (!card) return;
  if (res === "fuel") player.fuel += 1; else player.food += 1;
  showCardRevealEffect(card, () => {
    log("항해일지", `[${card.name}]을(를) 갈아 ${res === "fuel" ? "연료" : "식량"} 1을 얻었다.`);
    renderGauges(); renderShipStats(); renderGrindPanel();
  });
}

/* 카드 사용 — 타입에 따라 즉시 효과를 적용한다 (달성/업적 카드는 설치로만 사용) */
function useHandCard(idx){
  const card = HAND[idx];
  if (!card) return;
  if (card.type === "achievement"){
    log("항해일지", "이 카드는 개인 보드에 등록해야 사용할 수 있다.");
    return;
  }

  HAND.splice(idx, 1);

  if (card.type === "direct"){
    const r = card.reward || {};
    if (r.gold) player.gold += r.gold;
    if (r.fuel) player.fuel += r.fuel;
    if (r.food) player.food += r.food;
    if (r.fame) player.fame += r.fame;
    if (r.notoriety) player.notoriety += r.notoriety;
    log("항해일지", `[${card.name}]을(를) 사용했다.`);
  } else if (card.type === "discount"){
    player.nextBuyDiscount = (player.nextBuyDiscount || 0) + 0.1;
    log("항해일지", `[${card.name}]을(를) 사용했다. 다음 매수 1회에 10% 할인이 적용된다.`);
  } else if (card.type === "selldiscount"){
    player.nextSellBonus = (player.nextSellBonus || 0) + 0.1;
    log("항해일지", `[${card.name}]을(를) 사용했다. 다음 매도 1회에 10% 보너스가 적용된다.`);
  } else if (card.type === "deckmod"){
    let pool = INFO_EVENT_POOL;
    if (card.forceHazard) pool = INFO_EVENT_POOL.filter(c => c.type === "hazard");
    else if (card.forceBuff) pool = INFO_EVENT_POOL.filter(c => c.type === "buff" || c.type === "bonus");
    const seed = pool[Math.floor(Math.random() * pool.length)];
    DECK.push({ ...seed });
    log("항해일지", `[${card.name}]을(를) 사용해 해상 이벤트 카드 [${seed.name}]을(를) 이벤트 덱에 추가했다.`);
  } else {
    log("항해일지", `[${card.name}]을(를) 사용했다.`);
  }

  renderGauges(); renderShipStats();
}

/* --- 엔진 과부하 --- */
function openOverloadPanel(){
  activePanel = "overload";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "자원 변환 — 2:1 교환";
  renderOverloadPanel();
}
function renderOverloadPanel(){
  document.getElementById("panel-body").innerHTML = `
    <div style="font-size:12.5px;margin-bottom:10px;color:var(--parchment-dim);">
      자원 2개를 소모해 원하는 자원 1개로 바꾼다.
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <span style="font-size:12px;">소모(2)</span>
      <select id="overload-from">
        <option value="gold">골드</option>
        <option value="fuel">연료</option>
        <option value="food">식량</option>
      </select>
      <span style="font-size:12px;">→ 획득(1)</span>
      <select id="overload-to">
        <option value="gold">골드</option>
        <option value="fuel">연료</option>
        <option value="food">식량</option>
      </select>
      <button class="mini-btn" id="overload-confirm">과부하 실행</button>
    </div>
  `;
  document.getElementById("overload-confirm").addEventListener("click", doOverload);
}
function doOverload(){
  const from = document.getElementById("overload-from").value;
  const to = document.getElementById("overload-to").value;
  if (from === to){ log("기관사", "\"같은 자원끼리는 바꿀 수 없소.\""); return; }
  if (player[from] < 2){ log("기관사", `"${resLabel(from)}이(가) 2는 있어야 과부하를 걸지."`); return; }
  player[from] -= 2;
  player[to] += 1;
  log("항해일지", `${resLabel(from)} 2를 ${resLabel(to)} 1로 변환했다.`);
  renderGauges(); renderShipStats();
}

/* --- 카드 등록/설치 --- */
function openInstallPanel(){
  activePanel = "install";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "카드 등록/설치";
  renderInstallPanel();
}
function renderInstallPanel(){
  const body = document.getElementById("panel-body");
  const achievements = HAND.map((c, i) => ({ c, i })).filter(x => x.c.type === "achievement");
  if (achievements.length === 0){
    body.innerHTML = `<div style="font-size:13px;color:var(--parchment-dim);">설치할 수 있는 달성/업적 카드가 손패에 없다.</div>`;
    return;
  }
  body.innerHTML = achievements.map(({ c, i }) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(122,92,40,0.25);">
      <div style="max-width:70%;">
        <div style="font-size:12.5px;color:var(--parchment);">${c.name}</div>
        <div style="font-size:11px;color:var(--parchment-dim);">${c.desc}</div>
      </div>
      <button class="mini-btn" data-idx="${i}">설치 (${c.installCost.gold}G)</button>
    </div>
  `).join("");
  body.querySelectorAll(".mini-btn").forEach(btn => {
    btn.addEventListener("click", () => installCard(parseInt(btn.dataset.idx, 10)));
  });
}
function installCard(idx){
  const card = HAND[idx];
  if (!card) return;
  if (player.gold < card.installCost.gold){
    log("항해일지", "설치 비용이 부족하다.");
    return;
  }
  player.gold -= card.installCost.gold;
  HAND.splice(idx, 1);
  BOARD.push(card);
  showCardRevealEffect(card, () => {
    log("항해일지", `[${card.name}]을(를) 개인 보드에 등록했다.`);
    renderGauges(); renderInstallPanel();
  });
}

function openCompanionSkillPanel(){

  document.getElementById("panel-box").classList.add("open");

function renderCompanionSkillPanel(){
  const body = document.getElementById("panel-body");
  if (ship.crew.length === 0){
    body.innerHTML = `<div style="font-size:13px;color:var(--parchment-dim);">함께하는 동료가 없다.</div>`;
    return;
  }
  body.innerHTML = ship.crew.map((c, i) => `
    <div style="padding:8px 0;border-bottom:1px solid rgba(122,92,40,0.25);">
      <div style="font-size:12.5px;color:var(--parchment);">${c.name} — ${c.active.label}</div>
      <div style="font-size:11px;color:var(--parchment-dim);margin-bottom:6px;">${c.active.desc} (비용: ${c.active.cost})</div>
      <button class="mini-btn" data-idx="${i}" ${player.gold < (c.active.goldCost || 0) ? "disabled" : ""}>스킬 사용</button>
    </div>
  `).join("");
  body.querySelectorAll(".mini-btn").forEach(btn => {
    btn.addEventListener("click", () => useCompanionSkill(parseInt(btn.dataset.idx, 10)));
  });
}

function useCompanionSkill(idx){
  const companion = ship.crew[idx];
  if (!companion) return;
  const a = companion.active;
  const cost = a.goldCost || 0;
  if (player.gold < cost){ log(companion.name, `"${cost}G는 있어야지."`); return; }

  switch (a.effectType){
    case "market_manipulate": {
      const table = market.getMarket(player.location);
      const candidates = Object.values(table).filter(g => g.priceLevel > 1);
      if (candidates.length === 0){ log(companion.name, "\"이미 바닥 시세라 손댈 게 없구려.\""); return; }
      player.gold -= cost;
      const target = candidates[Math.floor(Math.random() * candidates.length)];
      target.adjustPrice(-1);
      log(companion.name, `시장 마커를 슬쩍 조작해 [${target.name}]의 가격 단계를 낮췄다.`);
      break;
    }
    case "resource_convert": {
      const amt = a.effectValue || 1;
      if (player.food < amt){ log(companion.name, "\"정제할 식량이 부족하오.\""); return; }
      player.gold -= cost;
      player.food -= amt;
      player.fuel += amt;
      log(companion.name, `식량 ${amt}을 정제해 연료 ${amt}로 바꿨다.`);
      break;
    }
    case "gain_card": {
      player.gold -= cost;
      const card = INFO_EVENT_POOL[Math.floor(Math.random() * INFO_EVENT_POOL.length)];
      HAND.push({ ...card });
      log(companion.name, `[${card.name}] 카드를 손패에 얻었다.`);
      break;
    }
    case "ignore_entry_denial": {
      player.gold -= cost;
      player.ignoreNextEntryDenial = true;
      log(companion.name, "\"다음번 입항 거부는 내가 대신 막아주지.\"");
      break;
    }
    case "mitigate_failure": {
      player.gold -= cost;
      player.failureMitigation = true;
      log(companion.name, "\"다음 위기에서는 내가 뒤를 봐주지.\"");
      break;
    }
    case "gain_gold": {
      player.gold -= cost;
      player.gold += (a.effectValue || 20);
      log(companion.name, `뒷거래로 ${a.effectValue || 20}G를 마련해줬다.`);
      break;
    }
    case "restore_fuel": {
      player.gold -= cost;
      player.fuel += (a.effectValue || 1);
      log(companion.name, `연료 ${a.effectValue || 1}을 채워줬다.`);
      break;
    }
    case "restore_food": {
      player.gold -= cost;
      player.food += (a.effectValue || 1);
      log(companion.name, `식량 ${a.effectValue || 1}을 채워줬다.`);
      break;
    }
    case "repair_hull": {
      player.gold -= cost;
      ship.hullDamage = Math.max(0, ship.hullDamage - (a.effectValue || 10));
      log(companion.name, `선체를 손봐 내구도 손상을 ${a.effectValue || 10}만큼 줄였다.`);
      break;
    }
    default: {
      log(companion.name, "\"...지금은 딱히 해줄 게 없구려.\"");
      return;
    }
  }

  renderGauges(); renderShipStats(); renderCompanionSkillPanel();
}

    <div class="fsp-row"><span>골드</span><b>${player.gold}G</b></div>
    <div class="fsp-row"><span>연료</span><b>${player.fuel}</b></div>
    <div class="fsp-row"><span>식량</span><b>${player.food}</b></div>
    <div class="fsp-row"><span>명성 / 악명</span><b>${player.fame} / ${player.notoriety}</b></div>
  `;
}

      if (act === "use") useHandCard(idx);
      else if (act === "grindfuel") grindCard(idx, "fuel");
      else if (act === "grindfood") grindCard(idx, "food");
