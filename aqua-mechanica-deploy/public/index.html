/* 레어 아이템 사용 — 소모되며 등급에 따른 즉시 보상을 준다 */
function useRareItem(idx){
  const item = RARE_ITEM_INVENTORY[idx];
  if (!item) return;
  RARE_ITEM_INVENTORY.splice(idx, 1);

  const e = item.useEffect || {};
  if (e.gold) player.gold += e.gold;
  if (e.vp) player.vp += e.vp;
  if (e.fame) player.fame += e.fame;
  if (e.notoriety) player.notoriety += e.notoriety;
  if (e.fuel) player.fuel += e.fuel;
  if (e.food) player.food += e.food;

  log("항해일지", `[${item.name}]을(를) 사용했다. ${item.useDesc}`);
  renderGauges(); renderShipStats();
}

function closePanel(){
  activePanel = null;
  document.getElementById("panel-box").classList.remove("open");
  document.getElementById("panel-body").innerHTML = "";
  clearPanelConfirm();
}
document.addEventListener("DOMContentLoaded", () => {});

/* 패널 헤더의 확정 버튼(닫기 왼쪽)을 각 패널이 재사용한다 */
function setPanelConfirm(label, handler, disabled){
  const btn = document.getElementById("panel-confirm-btn");
  btn.style.display = "inline-block";
  btn.textContent = label;
  btn.disabled = !!disabled;
  btn.onclick = handler;
}
function clearPanelConfirm(){
  const btn = document.getElementById("panel-confirm-btn");
  btn.style.display = "none";
  btn.onclick = null;
}

/* ===== A. 시장 거래 ===== */
let marketQty = {};
let marketStaged = {}; // { goodName: { action:'buy'|'sell', qty } }

function doOpenMarket(){
  const firstOpen = activePanel !== "market";
  activePanel = "market";
  if (firstOpen){ actionCharged = false; marketQty = {}; marketStaged = {}; }
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "마켓";
  renderMarketPanel();
  if (firstOpen){
    const port = PORTS.find(p => p.id === player.location);
    log("시장 상인", `어서 오시오. ${port.name}에서는 ${port.produces.join(", ")}이(가) 싸고, ${port.demands.join(", ")}은(는) 비싸게 쳐드리오.`);
  }
}

function renderMarketPanel(){
  const port = PORTS.find(p => p.id === player.location);
  const table = market.getMarket(port.id);
  const spaceLeft = ship.cargoSlots - ship.cargoUsed;

  // 매도로 담아둔 대금만큼 매수 여력에 미리 반영한다 (실제 정산은 확정 시 매도를 먼저 처리)
  const stagedSellRevenue = Object.entries(marketStaged).reduce((sum, [g, s]) => {
    if (s.action !== "sell" || !table[g]) return sum;
    return sum + table[g].price * s.qty;
  }, 0);
  const virtualGold = player.gold + stagedSellRevenue;

  const rows = ALL_GOODS.map(name => {
    const good = table[name];
    const holding = ship.cargo[name] || 0;
    const avgCost = holding > 0 ? Math.round((ship.cargoCost[name] || 0) / holding) : null;
    const affordable = good.price > 0 ? Math.floor(virtualGold / good.price) : 0;
    const maxBuy = good.qtyLevel > 1 ? Math.max(0, Math.min(spaceLeft, affordable)) : 0;
    const canBuy = maxBuy > 0;
    const canSell = holding > 0;
    const qtyMax = Math.max(1, Math.max(maxBuy, holding));
    if (marketQty[name] === undefined) marketQty[name] = 1;
    const qty = Math.min(marketQty[name], qtyMax);
    marketQty[name] = qty;
    const staged = marketStaged[name];
    return `<tr>
      <td class="name" data-label="상품">${name}${avgCost !== null ? `<br><span style="font-size:10px;color:var(--parchment-dim);font-weight:normal;">평균매입 ${avgCost}G</span>` : ""}</td>
      <td class="num" data-label="재고" style="color:${STOCK_COLORS[good.qtyLevel]};">${STOCK_LABELS[good.qtyLevel]}${maxBuy > 0 ? `<br><span style="color:var(--parchment-dim);font-size:10px;">(최대 ${maxBuy}개)</span>` : ""}</td>
      <td class="num" data-label="가격">${good.price}G</td>
      <td class="num" data-label="보유">${holding}</td>
      <td data-label="수량">
        <div class="qty-stepper">
          <button type="button" class="qty-btn" data-qty="dec" data-good="${name}" ${qty<=1?"disabled":""}>−</button>
          <span class="qty-display">${qty}</span>
          <button type="button" class="qty-btn" data-qty="inc" data-good="${name}" ${qty>=qtyMax?"disabled":""}>+</button>
        </div>
      </td>
      <td data-label="거래">
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          <button class="mini-btn" data-good="${name}" data-act="buy" ${canBuy?"":"disabled"}>매수 담기</button>
          <button class="mini-btn sell" data-good="${name}" data-act="sell" ${canSell?"":"disabled"}>매도 담기</button>
        </div>
        ${staged ? `<div style="font-size:10px;color:var(--teal-light);margin-top:4px;">예정: ${staged.action === "buy" ? "매수" : "매도"} ${staged.qty}개
          <button class="mini-btn" data-cancel="${name}" style="padding:1px 5px;margin-left:4px;">취소</button></div>` : ""}
      </td>
    </tr>`;
  }).join("");

  document.getElementById("panel-body").innerHTML = `
    <div style="font-size:11px;color:var(--parchment-dim);margin-bottom:8px;">+/− 로 수량을 정한 뒤 "담기"로 예약하고, 위 확정 버튼을 눌러야 실제로 거래됩니다. 매도 담은 금액은 매수 여력에 미리 반영됩니다. 시세 변동은 다음 마을 도착 시 한꺼번에 적용됩니다.</div>
    <div style="overflow-x:auto;">
      <table class="market-table">
        <thead><tr><th>상품</th><th>재고</th><th>가격</th><th>보유</th><th>수량</th><th>거래</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${RARE_ITEM_INVENTORY.length ? `
      <div class="section-label" style="text-align:left;margin:16px 0 8px;">레어 아이템 판매</div>
      <div style="font-size:11px;color:var(--parchment-dim);margin-bottom:8px;">등급이 높을수록 일반 화물보다 훨씬 비싸게 팔린다.</div>
      ${RARE_ITEM_INVENTORY.map((item, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(122,92,40,0.25);">
          <span style="font-size:12px;color:var(--parchment);">${item.name} <span style="color:var(--teal-light);font-size:10.5px;">(${item.tier})</span></span>
          <button class="mini-btn sell" data-sell-item-idx="${i}">판매 (${RARE_ITEM_BASE_VALUE * item.sellMultiplier}G)</button>
        </div>
      `).join("")}
    ` : ""}
  `;

  document.getElementById("panel-body").querySelectorAll("[data-sell-item-idx]").forEach(btn => {
    btn.addEventListener("click", () => {
      sellRareItem(parseInt(btn.dataset.sellItemIdx, 10));
      renderMarketPanel();
    });
  });

  document.getElementById("panel-body").querySelectorAll("[data-qty]").forEach(btn => {
    btn.addEventListener("click", () => {
      const good = btn.dataset.good;
      const delta = btn.dataset.qty === "inc" ? 1 : -1;
      marketQty[good] = Math.max(1, (marketQty[good] || 1) + delta);
      renderMarketPanel();
    });
  });

  document.getElementById("panel-body").querySelectorAll(".mini-btn[data-act]").forEach(btn => {
    btn.addEventListener("click", () => {
      const good = btn.dataset.good;
      const qty = Math.max(1, marketQty[good] || 1);
      marketStaged[good] = { action: btn.dataset.act, qty };
      renderMarketPanel();
    });
  });
  document.getElementById("panel-body").querySelectorAll("[data-cancel]").forEach(btn => {
    btn.addEventListener("click", () => {
      delete marketStaged[btn.dataset.cancel];
      renderMarketPanel();
    });
  });

  const stagedCount = Object.keys(marketStaged).length;
  setPanelConfirm(`확정 (${stagedCount}건)`, confirmMarketTrades, stagedCount === 0);
}

function confirmMarketTrades(){
  const entries = Object.entries(marketStaged);
  if (entries.length === 0) return;
  // 매도를 먼저 정산해 매도 대금으로 매수 여력을 실제로 확보한 뒤 매수를 처리한다
  entries.filter(([, s]) => s.action === "sell").forEach(([good, staged]) => tradeSell(good, staged.qty));
  entries.filter(([, s]) => s.action === "buy").forEach(([good, staged]) => tradeBuy(good, staged.qty));
  marketStaged = {};
  renderMarketPanel();
}

function sellRareItem(idx){
  const item = RARE_ITEM_INVENTORY[idx];
  if (!item) return;
  const price = RARE_ITEM_BASE_VALUE * item.sellMultiplier;
  RARE_ITEM_INVENTORY.splice(idx, 1);
  player.gold += price;
  log("시장 상인", `[${item.name}]을(를) ${price}G에 팔았다. "귀한 물건이군요."`);
  renderGauges(); renderShipStats();
}

function tradeBuy(goodName, amount){
  const port = PORTS.find(p => p.id === player.location);
  const result = market.buy(port.id, goodName, amount, player, ship);
  if (!result.ok){
    log("시장 상인", `"${result.reason}"`);
    return;
  }
  let note = "";
  if (player.reputation[factionKey(port.faction)] >= 50){
    const refund = Math.round(result.cost * 0.1);
    player.gold += refund;
    note += ` (${port.faction} 동맹 혜택으로 ${refund}G 환급)`;
  }
  const buyDiscount = (player.woodDiscount ? 0.1 : 0) + getCrewEffectValue("buy_discount");
  if (buyDiscount > 0){
    const refund = Math.round(result.cost * buyDiscount);
    player.gold += refund;
    note += ` (동료/사주 혜택으로 ${refund}G 환급)`;
  }
  const specialtyChance = getCrewEffectValue("specialty_bonus_chance");
  if (specialtyChance > 0 && port.produces.includes(goodName) && Math.random() < specialtyChance){
    const holding = ship.cargo[goodName] || 0;
    if (ship.cargoUsed < ship.cargoSlots){
      ship.cargo[goodName] = holding + 1;
      ship.cargoUsed += 1;
      note += ` (동료의 손길로 ${goodName} 1개를 추가로 얻었다)`;
    }
  }
  if (player.nextBuyDiscount){
    const cardRefund = Math.round(result.cost * player.nextBuyDiscount);
    player.gold += cardRefund;
    note += ` (카드 효과로 ${cardRefund}G 추가 환급)`;
    player.nextBuyDiscount = 0;
  }
  bumpAchievementProgress(goodName, "trade", port.id);
  chargeActionOnce();
  log("항해일지", `${goodName} ${result.amount}개를 개당 ${result.unitPrice}G(총 ${result.cost}G)에 매수했다.${note} 다음 마을에 도착하면 시세가 오를 것이다.`);
  renderGauges(); renderShipStats(); renderMarketPanel();
}

function tradeSell(goodName, amount){
  const port = PORTS.find(p => p.id === player.location);
  const result = market.sell(port.id, goodName, amount, player, ship);
  if (!result.ok){
    log("시장 상인", `"${result.reason}"`);
    return;
  }
  let note = "";
  if (player.reputation[factionKey(port.faction)] >= 50){
    const allyBonus = Math.round(result.revenue * 0.1);
    player.gold += allyBonus;
    note += ` (${port.faction} 동맹 혜택 +${allyBonus}G)`;
  }
  const key = factionKey(port.faction);
  const sellBonus = getCrewEffectValue("sell_bonus") + getCrewEffectValue("sell_bonus_faction", key);
  if (sellBonus > 0){
    const bonus = Math.round(result.revenue * sellBonus);
    player.gold += bonus;
    note += ` (동료의 인맥으로 +${bonus}G)`;
  }
  if (player.nextSellBonus){
    const cardBonus = Math.round(result.revenue * player.nextSellBonus);
    player.gold += cardBonus;
    note += ` (카드 효과로 +${cardBonus}G 추가)`;
    player.nextSellBonus = 0;
  }
  bumpAchievementProgress(goodName, "trade", port.id);
  chargeActionOnce();
  log("항해일지", `${goodName} ${result.amount}개를 개당 ${result.unitPrice}G(총 ${result.revenue}G)에 매도했다.${note} 다음 마을에 도착하면 이 항구의 시세가 내려갈 것이다.`);
  renderGauges(); renderShipStats(); renderMarketPanel();
}

function bumpAchievementProgress(goodName, context, portId){
  BOARD.forEach(c => {
    if (c.goalGood !== goodName || c.rewarded || c.goalCurrent >= c.goalTarget) return;
    if (c.missionPort && c.missionPort !== portId) return;   // 도시 임무는 해당 도시에서만 인정
    if (c.missionPort && context !== "donate") return;       // 도시 임무는 기부로만 달성
    c.goalCurrent += 1;
    if (c.goalCurrent >= c.goalTarget) triggerAchievementReward(c);
  });
}

/* ===== 달성 카드 완료 보상 ===== */
function triggerAchievementReward(card){
  card.rewarded = true;
  const goldReward = card.rewardGold !== undefined ? card.rewardGold : 1000;
  const vpReward = card.rewardVP !== undefined ? card.rewardVP : 10;
  const repReward = card.rewardRep !== undefined ? card.rewardRep : 15;
  const key = card.rewardFaction || null;
  player.gold += goldReward;
  player.vp += vpReward;
  if (key) player.reputation[key] += repReward;
  openAchievementPopup(card, key, goldReward, vpReward, repReward);
}

function openAchievementPopup(card, key, goldReward, vpReward, repReward){
  const prevPanel = activePanel;
  activePanel = "achievement-complete";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-close").style.display = "none";
  document.getElementById("panel-title-text").textContent = "달성 완료!";
  const factionLabel = key ? (FACTION_ROWS.find(f => f.key === key) || {}).label : null;
  const rewardParts = [`골드 ${goldReward}G`];
  if (factionLabel) rewardParts.push(`${factionLabel} 평판 +${repReward}`);
  rewardParts.push(`명예 점수(VP) +${vpReward}`);
  document.getElementById("panel-body").innerHTML = `
    <div style="font-size:13px;color:var(--parchment-dim);margin-bottom:14px;line-height:1.8;">
      [${card.name}] 목표를 달성했다!<br>
      보상: ${rewardParts.join(" · ")}
    </div>
    <button class="mini-btn" id="ach-confirm">확인</button>
  `;
  document.getElementById("ach-confirm").addEventListener("click", () => {
    document.getElementById("panel-close").style.display = "";
    if (prevPanel === "market"){ activePanel = "market"; renderMarketPanel(); }
    else if (prevPanel === "install"){ activePanel = "install"; renderInstallPanel(); }
    else { closePanel(); }
    renderGauges(); renderShipStats();
  });
  renderGauges(); renderShipStats();
}

/* ===== B. 물자 보급 ===== */
let supplyCart = { fuel: 0, food: 0 };

function doOpenSupply(){
  const firstOpen = activePanel !== "supply";
  activePanel = "supply";
  if (firstOpen){ actionCharged = false; supplyCart = { fuel: 0, food: 0 }; }
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "물자 보급 — 10G당 1개";
  renderSupplyPanel();
  if (firstOpen){
    log("보급 담당관", "연료와 식량을 채워드리지요. 원하는 만큼 고르고 마지막에 확정하시오.");
  }
}

function renderSupplyPanel(){
  const totalQty = supplyCart.fuel + supplyCart.food;
  const totalCost = totalQty * 10;
  const canAddMore = player.gold >= totalCost + 10;

  document.getElementById("panel-body").innerHTML = `
    <div class="supply-row">
      <span style="flex:1;">연료 (현재 ${player.fuel})</span>
      <div class="qty-stepper">
        <button type="button" class="qty-btn" data-supply="fuel-dec" ${supplyCart.fuel <= 0 ? "disabled" : ""}>−</button>
        <span class="qty-display">${supplyCart.fuel}</span>
        <button type="button" class="qty-btn" data-supply="fuel-inc" ${canAddMore ? "" : "disabled"}>+</button>
      </div>
    </div>
    <div class="supply-row">
      <span style="flex:1;">식량 (현재 ${player.food})</span>
      <div class="qty-stepper">
        <button type="button" class="qty-btn" data-supply="food-dec" ${supplyCart.food <= 0 ? "disabled" : ""}>−</button>
        <span class="qty-display">${supplyCart.food}</span>
        <button type="button" class="qty-btn" data-supply="food-inc" ${canAddMore ? "" : "disabled"}>+</button>
      </div>
    </div>
    <div style="margin:12px 0;font-size:12.5px;color:var(--parchment-dim);">총 비용: <b style="color:var(--brass-light);">${totalCost}G</b></div>
  `;

  document.getElementById("panel-body").querySelectorAll("[data-supply]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [kind, dir] = btn.dataset.supply.split("-");
      if (dir === "inc") supplyCart[kind] += 1;
      else supplyCart[kind] = Math.max(0, supplyCart[kind] - 1);
      renderSupplyPanel();
    });
  });

  setPanelConfirm(`확정 (${totalCost}G)`, confirmSupply, totalQty <= 0 || player.gold < totalCost);
}

function confirmSupply(){
  const totalQty = supplyCart.fuel + supplyCart.food;
  const totalCost = totalQty * 10;
  if (totalQty <= 0) return;
  if (player.gold < totalCost){ log("보급 담당관", "\"돈이 모자랍니다.\""); return; }

  player.gold -= totalCost;
  player.fuel += supplyCart.fuel;
  player.food += supplyCart.food;
  log("항해일지", `연료 ${supplyCart.fuel}, 식량 ${supplyCart.food}을(를) 보급했다. (총 ${totalCost}G)`);
  chargeActionOnce();
  renderGauges();
  supplyCart = { fuel: 0, food: 0 };
  closePanel();
}

/* ===== C. 정보 알아보기 ===== */
let tavernChoice = null; // "info" | "intel" | { type:"recruit", id } | null
let tavernIntelCities = [];

function doOpenTavern(){
  const firstOpen = activePanel !== "tavern";
  activePanel = "tavern";
  if (firstOpen){ actionCharged = false; tavernChoice = null; tavernIntelCities = []; }
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "술집 방문";
  renderTavernPanel();
  if (firstOpen){
    log("술집 주인", "\"소문이든 사람이든, 여기 다 있소. 한 번엔 하나씩만 처리해드리지.\"");
  }
}

function renderTavernPanel(){
  const body = document.getElementById("panel-body");
  const isIntelChoice = tavernChoice === "intel";
  const isRecruitChoice = tavernChoice && typeof tavernChoice === "object" && tavernChoice.type === "recruit";
  const isDismissChoice = tavernChoice && typeof tavernChoice === "object" && tavernChoice.type === "dismiss";
  const maxIntelCities = getMaxIntelCities();

  let html = `<div class="section-label" style="text-align:left;">한 가지만 골라주세요</div>`;

  html += `
    <label class="choice-option">
      <input type="radio" name="tavern-choice" value="info" ${tavernChoice === "info" ? "checked" : ""} ${player.gold < 30 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">이벤트 카드 정보 캐기 (30G)</div>
        <div class="choice-option-desc">무작위 해상 이벤트 카드 1장을 덱에 추가한다${player.infoChoiceMode ? " (바람의 기운으로 2장 중 1장 선택)" : ""}.</div>
      </div>
    </label>
    <label class="choice-option">
      <input type="radio" name="tavern-choice" value="intel" ${isIntelChoice ? "checked" : ""} ${player.gold < 10 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">세계 시장 동향 정보 구매 (10G)</div>
        <div class="choice-option-desc">
          원하는 항구 ${maxIntelCities}곳을 골라 특산물/수요품 시세를 확인한다. (${tavernIntelCities.length} / ${maxIntelCities} 선택됨)
          ${maxIntelCities > 3 ? `<br><span style="color:var(--teal-light);">뒷골목 정보원 덕분에 1곳 추가로 볼 수 있다.</span>` : ""}
        </div>
      </div>
    </label>
  `;

  if (isIntelChoice){
    const intelDistances = computeDistancesFrom(player.location);
    html += `<div class="choice-suboptions">` + PORTS.map(p => {
      const checked = tavernIntelCities.includes(p.id);
      const disable = !checked && tavernIntelCities.length >= maxIntelCities;
      const distText = p.id === player.location ? "현재 위치" : `${intelDistances[p.id]}칸`;
      return `<label class="choice-subcheck">
        <input type="checkbox" data-intel-city="${p.id}" ${checked ? "checked" : ""} ${disable ? "disabled" : ""}>
        <span>${p.name} <span style="color:var(--parchment-dim);font-size:10px;">(${p.faction} · ${distText})</span></span>
      </label>`;
    }).join("") + `</div>`;
  }

  const alreadyIds = ship.crew.map(c => c.id);
  const candidates = RECRUIT_POOL.filter(r => r.condition(player) && !alreadyIds.includes(r.id));
  const full = ship.crewUsed >= ship.crewSlots;

  html += `
    <label class="choice-option">
      <input type="radio" name="tavern-choice" value="recruit" ${isRecruitChoice ? "checked" : ""} ${candidates.length === 0 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">동료 영입</div>
        <div class="choice-option-desc">${candidates.length === 0 ? "지금은 영입할 만한 인물이 없다." : full ? "동료 슬롯이 가득 찼다 — 영입하려면 먼저 한 명을 해고해야 한다." : "명성/악명 조건을 채운 인물을 영입한다."}</div>
      </div>
    </label>
  `;

  if (isRecruitChoice && candidates.length){
    html += `<div class="choice-suboptions">` + candidates.map(r => {
      const cost = getRecruitCost(r);
      const checked = tavernChoice.id === r.id;
      return `<label class="choice-subcheck">
        <input type="radio" name="tavern-recruit-pick" value="${r.id}" ${checked ? "checked" : ""} ${player.gold < cost ? "disabled" : ""}>
        <span>[${r.tier}] ${r.name} (${r.role}) — 영입비 ${cost}G<br><span style="font-size:10.5px;">${r.stat}</span></span>
      </label>`;
    }).join("") + `</div>`;

    if (full && tavernChoice.id){
      html += `<div class="choice-suboptions">
        <div style="font-size:11px;color:var(--rust-light);margin-bottom:6px;">자리가 없어 아래 중 한 명을 해고해야 영입할 수 있다.</div>
        ` + ship.crew.map((c, i) => {
        const checked = tavernChoice.fireId === i;
        return `<label class="choice-subcheck">
          <input type="radio" name="tavern-recruit-fire" value="${i}" ${checked ? "checked" : ""}>
          <span>${c.name} 해고하기</span>
        </label>`;
      }).join("") + `</div>`;
    }
  }

  html += `
    <label class="choice-option">
      <input type="radio" name="tavern-choice" value="dismiss" ${isDismissChoice ? "checked" : ""} ${ship.crew.length === 0 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">동료 해고</div>
        <div class="choice-option-desc">${ship.crew.length === 0 ? "해고할 동료가 없다." : "선단에서 동료 한 명을 내보낸다."}</div>
      </div>
    </label>
  `;

  if (isDismissChoice){
    html += `<div class="choice-suboptions">` + ship.crew.map((c, i) => {
      const checked = tavernChoice.id === i;
      return `<label class="choice-subcheck">
        <input type="radio" name="tavern-dismiss-pick" value="${i}" ${checked ? "checked" : ""}>
        <span>${c.name} <span style="font-size:10.5px;color:var(--parchment-dim);">— ${c.stat}</span></span>
      </label>`;
    }).join("") + `</div>`;
  }

  body.innerHTML = html;

  body.querySelectorAll('input[name="tavern-choice"]').forEach(radio => {
    radio.addEventListener("change", () => {
      if (radio.value === "recruit") tavernChoice = { type:"recruit", id:null, fireId:null };
      else if (radio.value === "dismiss") tavernChoice = { type:"dismiss", id:null };
      else tavernChoice = radio.value;
      renderTavernPanel();
    });
  });
  body.querySelectorAll("[data-intel-city]").forEach(cb => {
    cb.addEventListener("change", () => {
      const id = cb.dataset.intelCity;
      if (cb.checked){
        if (tavernIntelCities.length < getMaxIntelCities()) tavernIntelCities.push(id);
      } else {
        tavernIntelCities = tavernIntelCities.filter(x => x !== id);
      }
      renderTavernPanel();
    });
  });
  body.querySelectorAll('input[name="tavern-recruit-pick"]').forEach(radio => {
    radio.addEventListener("change", () => {
      tavernChoice = { type:"recruit", id: radio.value, fireId: null };
      renderTavernPanel();
    });
  });
  body.querySelectorAll('input[name="tavern-recruit-fire"]').forEach(radio => {
    radio.addEventListener("change", () => {
      tavernChoice.fireId = parseInt(radio.value, 10);
      renderTavernPanel();
    });
  });
  body.querySelectorAll('input[name="tavern-dismiss-pick"]').forEach(radio => {
    radio.addEventListener("change", () => {
      tavernChoice = { type:"dismiss", id: parseInt(radio.value, 10) };
      renderTavernPanel();
    });
  });

  setPanelConfirm("확정", confirmTavernAction, !isTavernChoiceValid());
}

function getMaxIntelCities(){
  return 3 + getCrewEffectValue("intel_extra_city");
}

function isTavernChoiceValid(){
  if (tavernChoice === "info") return player.gold >= 30;
  if (tavernChoice === "intel") return player.gold >= 10 && tavernIntelCities.length === getMaxIntelCities();
  if (tavernChoice && typeof tavernChoice === "object" && tavernChoice.type === "recruit"){
    if (!tavernChoice.id) return false;
    const full = ship.crewUsed >= ship.crewSlots;
    if (full && (tavernChoice.fireId === null || tavernChoice.fireId === undefined)) return false;
    return true;
  }
  if (tavernChoice && typeof tavernChoice === "object" && tavernChoice.type === "dismiss") return tavernChoice.id !== null && tavernChoice.id !== undefined;
  return false;
}

function confirmTavernAction(){
  if (!isTavernChoiceValid()) return;

  if (tavernChoice === "info"){
    confirmGatherInfo();
  } else if (tavernChoice === "intel"){
    player.gold -= 10;
    chargeActionOnce();
    showMarketIntelResult(tavernIntelCities);
    renderGauges();
    tavernChoice = null;
    tavernIntelCities = [];
    closePanel();
  } else if (tavernChoice.type === "recruit"){
    if (tavernChoice.fireId !== null && tavernChoice.fireId !== undefined){
      const fired = ship.crew.splice(tavernChoice.fireId, 1)[0];
      ship.crewUsed = ship.crew.length;
      if (fired) log(fired.name, `"그동안 고마웠소." ${fired.name}이(가) 선단을 떠났다.`);
    }
    recruitCompanion(tavernChoice.id);
    tavernChoice = null;
    closePanel();
  } else if (tavernChoice.type === "dismiss"){
    const fired = ship.crew.splice(tavernChoice.id, 1)[0];
    ship.crewUsed = ship.crew.length;
    if (fired){
      chargeActionOnce();
      log(fired.name, `"그동안 고마웠소." ${fired.name}이(가) 선단을 떠났다.`);
      renderShipStats();
    }
    tavernChoice = null;
    closePanel();
  }
}

function showMarketIntelResult(cityIds){
  const distances = computeDistancesFrom(player.location);
  const rows = cityIds.map(id => {
    const p = PORTS.find(pp => pp.id === id);
    const table = market.getMarket(id);
    const cheapest = [...p.produces]
      .map(g => ({ name:g, price:table[g].price, level:table[g].qtyLevel }))
      .sort((a, b) => a.price - b.price)[0];
    const priciest = [...p.demands]
      .map(g => ({ name:g, price:table[g].price, level:table[g].qtyLevel }))
      .sort((a, b) => b.price - a.price)[0];
    const dist = distances[id];
    const distText = id === player.location ? "현재 위치" : `${dist}칸`;
    return `${p.name}(${p.faction}, ${distText}): 싼 특산물 ${cheapest.name} ${cheapest.price}G / 비싼 수요품 ${priciest.name} ${priciest.price}G`;
  }).join(" · ");
  log("술집 정보상", `시장 동향을 전해줬다 — ${rows}`);
}

function confirmGatherInfo(){
  if (player.gold < 30){
    log("뒷골목 정보상", "\"30G는 있어야 입을 열지.\"");
    return;
  }
  player.gold -= 30;
  chargeActionOnce();
  tavernChoice = null;

  if (player.infoChoiceMode){
    const shuffled = [...GENERAL_CARD_POOL].sort(() => Math.random() - 0.5);
    openInfoChoicePanel([shuffled[0], shuffled[1]]);
    log("뒷골목 정보상", "\"바람의 기운을 타고났군. 두 가지 소문 중 하나만 골라 보시오.\"");
    renderGauges();
    return;
  }

  const card = GENERAL_CARD_POOL[Math.floor(Math.random() * GENERAL_CARD_POOL.length)];
  const instance = { ...card, id: card.id + "_" + Date.now() };
  HAND.push(instance);
  showCardRevealEffect(card, () => {
    log("뒷골목 정보상", `"${card.name}에 대한 이야기를 들었소." — 카드 [${card.name}]이(가) 손패에 추가되었다.`);
    renderGauges();
    closePanel();
  });
}

function openInfoChoicePanel(options){
  activePanel = "info-choice";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "바람의 기운 — 소문 하나를 고르시오";
  const body = document.getElementById("panel-body");
  body.innerHTML = options.map((c, i) => `
    <div style="padding:8px 0;border-bottom:1px solid rgba(122,92,40,0.25);">
      <div style="font-size:12.5px;color:var(--parchment);">${c.name}</div>
      <div style="font-size:11px;color:var(--parchment-dim);margin-bottom:6px;">${c.desc}</div>
      <button class="mini-btn" data-idx="${i}">이 소문을 선택한다</button>
    </div>
  `).join("");
  body.querySelectorAll(".mini-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const chosen = options[parseInt(btn.dataset.idx, 10)];
      HAND.push({ ...chosen, id: chosen.id + "_" + Date.now() });
      log("뒷골목 정보상", `[${chosen.name}] 카드를 손패에 추가했다.`);
      renderGauges();
      closePanel();
    });
  });
}

/* ===== D. 조선소 정비 — 실제 트랙 업그레이드 및 선체 수리 ===== */
let shipyardChoice = null; // { type:"track", key } | { type:"repair" } | null

function doShipyard(){
  const firstOpen = activePanel !== "shipyard";
  activePanel = "shipyard";
  if (firstOpen){ actionCharged = false; shipyardChoice = null; }
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "조선소 — 선박 개조 / 선체 수리";
  renderShipyardPanel();
  if (firstOpen){
    log("조선공", "\"어디 손볼 곳이 있는지 봅시다. 한 번에 하나만 고르시오.\"");
  }
}

function renderShipyardPanel(){
  const body = document.getElementById("panel-body");
  const hullMax = hullMaxForLevel(ship.tracks.hull);
  const hullCurrent = hullMax - ship.hullDamage;

  const tracksHtml = Object.keys(TRACK_LABEL).map(key => {
    const lv = ship.tracks[key];
    const max = TRACK_MAX[key];
    const atMax = lv >= max;
    const cost = atMax ? null : getTrackUpgradeCost(key, lv);
    const preview = atMax ? "최대 레벨" : `LV${lv + 1}: ${trackEffectPreview(key, lv + 1)}${cost != null ? ` (비용 ${cost}G)` : ""}`;
    const disabled = atMax || player.gold < cost;
    const checked = shipyardChoice && shipyardChoice.type === "track" && shipyardChoice.key === key;
    return `
      <label class="choice-option">
        <input type="radio" name="shipyard-choice" value="track:${key}" ${checked ? "checked" : ""} ${disabled ? "disabled" : ""}>
        <div>
          <div class="choice-option-title">${TRACK_LABEL[key]} — 현재 LV${lv}</div>
          <div class="choice-option-desc">${preview}</div>
        </div>
      </label>
    `;
  }).join("");

  const repairDisabled = ship.hullDamage <= 0 || player.gold < 20;
  const repairChecked = shipyardChoice && shipyardChoice.type === "repair";

  body.innerHTML = `
    ${player.shipyardDiscount ? `<div style="font-size:11px;color:var(--teal-light);margin-bottom:8px;">흙(土) 별자리 기운으로 개조비 20% 할인 적용 중</div>` : ""}
    ${tracksHtml}
    <label class="choice-option">
      <input type="radio" name="shipyard-choice" value="repair" ${repairChecked ? "checked" : ""} ${repairDisabled ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">선체 수리</div>
        <div class="choice-option-desc">내구도 ${hullCurrent} / ${hullMax}${isHullBelowHalf() ? " — 50% 이하: 항해 주사위 -1 페널티 적용 중" : ""} · 10pt 회복 (20G)</div>
      </div>
    </label>
  `;

  body.querySelectorAll('input[name="shipyard-choice"]').forEach(radio => {
    radio.addEventListener("change", () => {
      shipyardChoice = radio.value === "repair" ? { type:"repair" } : { type:"track", key: radio.value.split(":")[1] };
      renderShipyardPanel();
    });
  });

  setPanelConfirm("확정", confirmShipyard, !shipyardChoice);
}

function confirmShipyard(){
  if (!shipyardChoice) return;
  if (shipyardChoice.type === "repair") repairHull();
  else upgradeTrack(shipyardChoice.key);
  shipyardChoice = null;
  closePanel();
}

function getTrackUpgradeCost(key, lv){
  const raw = trackUpgradeCost(key, lv);
  const discount = (player.shipyardDiscount || 0) + getCrewEffectValue("shipyard_discount");
  return discount > 0 ? Math.round(raw * (1 - Math.min(0.8, discount))) : raw;
}

function upgradeTrack(key){
  const lv = ship.tracks[key];
  const max = TRACK_MAX[key];
  if (lv >= max) return;
  const cost = getTrackUpgradeCost(key, lv);
  if (player.gold < cost){ log("조선공", "\"돈이 모자라는구려.\""); return; }

  player.gold -= cost;
  ship.tracks[key] = lv + 1;

  if (key === "cargo"){
    ship.cargoSlots = cargoSlotsForLevel(ship.tracks.cargo);
    log("조선공", `화물칸을 개조했다. 이제 화물칸이 ${ship.cargoSlots}칸이다.`);
  } else if (key === "quarters"){
    ship.crewSlots = crewSlotsForLevel(ship.tracks.quarters);
    log("조선공", `거주구를 넓혔다. 이제 동료 슬롯이 ${ship.crewSlots}칸이다.`);
  } else if (key === "cannon"){
    log("조선공", `함포를 개량했다. 전투 보정이 +${cannonBonusForLevel(ship.tracks.cannon)}이 됐다.`);
  } else if (key === "hull"){
    log("조선공", `선체를 보강했다. 최대 내구도가 ${hullMaxForLevel(ship.tracks.hull)}이 됐다.`);
  } else if (key === "engine"){
    log("조선공", "엔진을 개량했다. 항해 중 연료가 덜 소모될 확률이 올랐다.");
  }

  chargeActionOnce();
  renderGauges(); renderShipStats();
}

function repairHull(){
  if (ship.hullDamage <= 0){ log("조선공", "\"이미 흠 잡을 데 없이 멀쩡하오.\""); return; }
  if (player.gold < 20){ log("조선공", "\"20G는 있어야 손을 대지.\""); return; }
  player.gold -= 20;
  ship.hullDamage = Math.max(0, ship.hullDamage - 10);
  log("조선공", `선체 내구도 10pt를 수리했다. (남은 손상 ${ship.hullDamage})`);
  chargeActionOnce();
  renderGauges();
}

/* ===== E. 마을 투자 ===== */
/* ===== E. 시청 방문 — 명성 홍보 / 마을 투자 (하나의 행동에서 세 가지 중 선택) ===== */
let cityHallChoice = null; // "pledge" | { type:"donate", good } | "invest" | null

function doOpenPromotion(){
  const firstOpen = activePanel !== "promo";
  activePanel = "promo";
  if (firstOpen){ actionCharged = false; cityHallChoice = null; }
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "시청 방문 — 명성 홍보 / 마을 투자";
  renderPromotionPanel();
  if (firstOpen){
    log("항구 관리소", "\"기부든 투자든, 한 번에 하나만 처리해드립니다.\"");
  }
}

function renderPromotionPanel(){
  const body = document.getElementById("panel-body");
  const cargoEntries = Object.entries(ship.cargo);
  const port = PORTS.find(p => p.id === player.location);
  const table = market.getMarket(port.id);
  const key = factionKey(port.faction);
  const alreadyInvested = player.investedCities.includes(port.id);
  const isDonateChoice = cityHallChoice && typeof cityHallChoice === "object" && cityHallChoice.type === "donate";

  let html = `<div class="section-label" style="text-align:left;">한 가지만 골라주세요</div>`;

  html += `
    <label class="choice-option">
      <input type="radio" name="cityhall-choice" value="pledge" ${cityHallChoice === "pledge" ? "checked" : ""} ${player.gold < 100 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">기부금 납부 (100G)</div>
        <div class="choice-option-desc">명성 +5, 증기 제국·연금술사 연합·자유 상인 연맹 평판이 각 +5 오른다.</div>
      </div>
    </label>
    <label class="choice-option">
      <input type="radio" name="cityhall-choice" value="donate" ${isDonateChoice ? "checked" : ""} ${cargoEntries.length === 0 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">화물 기부</div>
        <div class="choice-option-desc">${cargoEntries.length === 0 ? "기부할 화물이 없다." : "보유 화물 1개를 기부해 시세의 10%만큼 명성을 얻는다."}</div>
      </div>
    </label>
  `;

  if (isDonateChoice){
    html += `<div class="choice-suboptions">` + cargoEntries.map(([name, qty]) => {
      const price = table[name] ? table[name].price : 0;
      const fameGain = Math.max(1, Math.round(price * 0.1));
      const checked = cityHallChoice.good === name;
      return `<label class="choice-subcheck">
        <input type="radio" name="cityhall-donate-good" value="${name}" ${checked ? "checked" : ""}>
        <span>${name} (보유 ${qty}) — 명성 +${fameGain}</span>
      </label>`;
    }).join("") + `</div>`;
  }

  const isDonateItemChoice = cityHallChoice && typeof cityHallChoice === "object" && cityHallChoice.type === "donateItem";
  html += `
    <label class="choice-option">
      <input type="radio" name="cityhall-choice" value="donateItem" ${isDonateItemChoice ? "checked" : ""} ${RARE_ITEM_INVENTORY.length === 0 ? "disabled" : ""}>
      <div>
        <div class="choice-option-title">레어 아이템 기부</div>
        <div class="choice-option-desc">${RARE_ITEM_INVENTORY.length === 0 ? "기부할 레어 아이템이 없다." : "보관함의 레어 아이템 1개를 기부해 대량의 명성·VP·영향력을 얻는다."}</div>
      </div>
    </label>
  `;
  if (isDonateItemChoice){
    html += `<div class="choice-suboptions">` + RARE_ITEM_INVENTORY.map((item, i) => {
      const checked = cityHallChoice.idx === i;
      return `<label class="choice-subcheck">
        <input type="radio" name="cityhall-donate-item" value="${i}" ${checked ? "checked" : ""}>
        <span>${item.name} (${item.tier}) — 명성+${item.donateFame}·VP+${item.donateVP}·영향력+${item.donateInfluence}</span>
      </label>`;
    }).join("") + `</div>`;
  }

  const cityState = CITY_STATE[port.id];
  const cap = influenceSlotsForLevel(cityState.level);
  const totalInfluence = Object.values(cityState.influence).reduce((a, b) => a + b, 0);
  const influenceRows = Object.entries(cityState.influence)
    .sort((a, b) => b[1] - a[1])
    .map(([who, cnt]) => `${who === "player" ? "나" : who} ${cnt}`)
    .join(", ") || "아직 없음";

  html += `
    <label class="choice-option">
      <input type="radio" name="cityhall-choice" value="invest" ${cityHallChoice === "invest" ? "checked" : ""}>
      <div>
        <div class="choice-option-title">마을 투자</div>
        <div class="choice-option-desc">
          ${port.faction} 평판 +10 (현재 ${player.reputation[key]}). 투자하면 이 도시에 영향력 마커 1개를 놓는다.
          ${alreadyInvested ? " 이미 지분 마커 보유." : " 지분 마커를 새로 얻는다."}<br>
          <span style="color:var(--teal-light);">${port.name} — 도시 단계 LV${cityState.level} · 영향력 ${totalInfluence}/${cap} (${influenceRows})</span>
        </div>
      </div>
    </label>
  `;

  body.innerHTML = html;

  body.querySelectorAll('input[name="cityhall-choice"]').forEach(radio => {
    radio.addEventListener("change", () => {
      if (radio.value === "donate") cityHallChoice = { type:"donate", good:null };
      else if (radio.value === "donateItem") cityHallChoice = { type:"donateItem", idx:null };
      else cityHallChoice = radio.value;
      renderPromotionPanel();
    });
  });
  body.querySelectorAll('input[name="cityhall-donate-good"]').forEach(radio => {
    radio.addEventListener("change", () => {
      cityHallChoice = { type:"donate", good: radio.value };
      renderPromotionPanel();
    });
  });
  body.querySelectorAll('input[name="cityhall-donate-item"]').forEach(radio => {
    radio.addEventListener("change", () => {
      cityHallChoice = { type:"donateItem", idx: parseInt(radio.value, 10) };
      renderPromotionPanel();
    });
  });

  setPanelConfirm("확정", confirmCityHall, !isCityHallChoiceValid());
}

function isCityHallChoiceValid(){
  if (cityHallChoice === "pledge" || cityHallChoice === "invest") return true;
  if (cityHallChoice && typeof cityHallChoice === "object" && cityHallChoice.type === "donate" && cityHallChoice.good) return true;
  if (cityHallChoice && typeof cityHallChoice === "object" && cityHallChoice.type === "donateItem" && cityHallChoice.idx !== null && cityHallChoice.idx !== undefined) return true;
  return false;
}

function confirmCityHall(){
  if (!isCityHallChoiceValid()) return;
  if (cityHallChoice === "pledge") pledgeFame();
  else if (cityHallChoice === "invest") confirmTownInvest();
  else if (cityHallChoice.type === "donateItem") donateRareItem(cityHallChoice.idx);
  else donateCargo(cityHallChoice.good);
  cityHallChoice = null;
  closePanel();
}

function donateRareItem(idx){
  const item = RARE_ITEM_INVENTORY[idx];
  if (!item) return;
  const port = PORTS.find(p => p.id === player.location);
  RARE_ITEM_INVENTORY.splice(idx, 1);
  player.fame += item.donateFame;
  player.vp += item.donateVP;
  placeInfluence(port.id, "player", item.donateInfluence);
  chargeActionOnce();
  log("항구 관리소", `[${item.name}]을(를) 기부했다! 명성 +${item.donateFame}, VP +${item.donateVP}, 이 도시에 영향력 마커 ${item.donateInfluence}개를 놓았다.`);
  renderGauges(); renderShipStats();
}

function confirmTownInvest(){
  const port = PORTS.find(p => p.id === player.location);
  const key = factionKey(port.faction);
  player.reputation[key] += 10;
  if (!player.investedCities.includes(port.id)){
    player.investedCities.push(port.id);
  }
  placeInfluence(port.id, "player", 1);
  chargeActionOnce();
  log("항구 관리소", `${port.faction}에 자금을 투자했다. ${port.faction} 평판이 10 올랐다 (현재 ${player.reputation[key]}). 이 도시에 영향력 마커 1개를 놓았다.`);
  renderGauges();
}

function pledgeFame(){
  if (player.gold < 100){ log("항구 서기", "\"100G가 있어야 기부할 수 있소.\""); return; }
  player.gold -= 100;
  player.fame += 5;
  player.reputation.empire += 5;
  player.reputation.union += 5;
  player.reputation.merchants += 5;
  log("항구 서기", "기부금 100G를 납부했다. 명성이 5 오르고 세 세력의 평판이 각각 5씩 올랐다.");
  chargeActionOnce();
  renderGauges(); renderShipStats();
}

function donateCargo(goodName){
  const holding = ship.cargo[goodName] || 0;
  if (holding <= 0) return;
  const port = PORTS.find(p => p.id === player.location);
  const table = market.getMarket(port.id);
  const price = table[goodName] ? table[goodName].price : 0;
  const fameGain = Math.max(1, Math.round(price * 0.1));

  const prevCost = ship.cargoCost[goodName] || 0;
  ship.cargoCost[goodName] = Math.max(0, Math.round(prevCost * (1 - 1 / holding)));
  ship.cargo[goodName] = holding - 1;
  ship.cargoUsed -= 1;
  if (ship.cargo[goodName] <= 0){ delete ship.cargo[goodName]; delete ship.cargoCost[goodName]; }
  player.fame += fameGain;

  bumpAchievementProgress(goodName, "donate", port.id);
  log("항구 서기", `${goodName} 1개를 기부했다. 명성이 ${fameGain} 올랐다.`);
  chargeActionOnce();
  renderGauges(); renderShipStats();
}

/* ===== F. 동료 영입 ===== */
function getRecruitCost(template){
  const base = template.recruitCost || 0;
  const discount = (player.recruitDiscount || 0) + getCrewEffectValue("recruit_discount");
  return discount > 0 ? Math.round(base * (1 - Math.min(0.8, discount))) : base;
}

function recruitCompanion(id){
  const template = RECRUIT_POOL.find(r => r.id === id);
  if (!template) return;
  if (ship.crewUsed >= ship.crewSlots){ log("술집 주인", "\"자리가 없어 보이는데.\""); return; }
  const cost = getRecruitCost(template);
  if (player.gold < cost){ log("술집 주인", `"${getAddressTitle()}, ${cost}G는 있어야 이 사람을 소개해드리지."`); return; }

  player.gold -= cost;
  ship.crew.push({
    id: template.id, name: template.name, role: template.role,
    desc: template.stat, stat: template.stat, active: template.active,
    effects: template.effects || [], tier: template.tier || "C",
  });
  ship.crewUsed = ship.crew.length;
  log(template.name, `"함께 하지, ${getAddressTitle()}." ${template.name}이(가) 선단에 합류했다.`);
  chargeActionOnce();
  renderGauges(); renderShipStats();
}

/* ===== 항해 시작 — 목적지 선택 ===== */
function doOpenDestinations(){
  activePanel = "destinations";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "목적지를 선택하라";
  renderDestinationPanel();
}

function renderDestinationPanel(){
  const distances = computeDistancesFrom(player.location);
  const entries = Object.entries(distances).sort((a, b) => a[1] - b[1]);
  const body = document.getElementById("panel-body");

    body.innerHTML = `<div style="font-size:13px;color:var(--parchment-dim);">이 항구에서 이어지는 항로가 없다.</div>`;
    return;
  }
  body.innerHTML = `<div style="max-height:400px;overflow-y:auto;">` + entries.map(([destId, dist]) => {

    btn.addEventListener("click", () => beginVoyage(btn.dataset.dest, parseInt(btn.dataset.dist, 10)));

/* ===== 항해 단계 — 거리만큼 한 칸씩 이동 ===== */
function beginVoyage(destination, distance){
  closePanel();
  voyage = { destination, total: distance, remaining: distance, distressed: false };
  document.getElementById("town-actions").innerHTML = "";
  document.getElementById("minor-actions").innerHTML = "";
  document.getElementById("voyage-box").classList.add("open");
  log("항해일지", `닻을 올리고 ${destination}을(를) 향해 항해를 시작한다. 총 ${distance}칸의 항로다.`);
  renderVoyagePanel();
}

function renderVoyageSteps(){
  const traveled = voyage.total - voyage.remaining;
  let html = "";
  for (let i = 0; i < voyage.total; i++){
    let cls = "voyage-step";
    if (i < traveled) cls += " done";
    else if (i === traveled) cls += " current";
    html += `<div class="${cls}">${i+1}</div>`;
  }
  return html;
}

function renderVoyagePanel(){
  const box = document.getElementById("voyage-box");

  if (voyage.distressed){
    box.innerHTML = `
      <div class="voyage-heading">목적지 <b>${voyage.destination}</b>까지 남은 거리: <b>${voyage.remaining}칸</b></div>
      <div class="voyage-steps">${renderVoyageSteps()}</div>
      <div class="distress-banner">조난 상태 — 연료와 식량이 모두 바닥났다. 무언가를 희생해야 한 칸을 나아갈 수 있다.</div>
      <div class="voyage-controls">
        <button class="action-btn" id="btn-distress-step" style="border-left-color:var(--rust-light);">
          <span>대가를 치르고 전진한다</span><span class="tag">손패 카드 또는 동료 희생</span>
        </button>
      </div>
    `;
    document.getElementById("btn-distress-step").addEventListener("click", attemptDistressStep);
    return;
  }

  if (voyage.remaining <= 0){
    renderArrivalGate();
    return;
  }

  box.innerHTML = `
    <div class="voyage-heading">목적지 <b>${voyage.destination}</b>까지 남은 거리: <b>${voyage.remaining}칸</b></div>
    <div class="voyage-steps">${renderVoyageSteps()}</div>
    <div class="voyage-controls">
      <button class="action-btn" id="btn-step"><span>다음 칸으로 이동</span><span class="tag">연료·식량 소모 및 이벤트 발생</span></button>
    </div>
  `;
  document.getElementById("btn-step").addEventListener("click", stepVoyage);
}

const GATE_LOW = 15, GATE_MID = 30, GATE_HIGH = 50; // 명성/악명 게이트 기준 (선택지 잠금 해제 수치)
const SPECIAL_FLOW_TYPES = new Set(["combat", "storm", "ghost", "wreck", "auction"]);

function stepVoyage(){
  if (!voyage || voyage.distressed || voyage.remaining <= 0) return;

  const card = DECK[Math.floor(Math.random() * DECK.length)];
  showCardRevealEffect(card, () => {
    if (SPECIAL_FLOW_TYPES.has(card.type)){
      openVoyageEventChoice(card);
    } else {
      resolveSimpleCard(card);
    }
  });
}

/* 선택지/주사위가 필요 없는 카드 — 효과가 있으면 즉시 적용하고, 없으면 그대로 전진한다 */
function resolveSimpleCard(card){
  let fuelCost = 3;
  let foodCost = 1 + ship.crew.length;
  let extraNote = "";
  let rewardText = null;
  let damageText = null;

  if (card.id === "tailwind" || card.id === "lighthouse"){
    fuelCost = Math.max(0, fuelCost - 1);
    extraNote = card.id === "tailwind" ? " 순풍 덕에 연료 소모가 줄었다." : " 등대지기의 조언 덕에 연료 소모가 줄었다.";
  } else if (card.id === "reef" || card.id === "fog_bank"){
    foodCost += 1;
    extraNote = card.id === "reef" ? " 암초에 긁혀 식량 일부가 유실됐다." : " 안개 속에서 길을 헤매 식량을 더 소모했다.";
    damageText = "식량 -1 추가 손실";
  } else if (card.id === "driftcargo"){
    player.gold += 30;
    extraNote = " 떠내려온 화물에서 30G 상당을 건졌다.";
    rewardText = "+30G";
  } else if (card.id === "trade_wind"){
    player.gold += 15;
    extraNote = " 무역풍을 타고 소소한 부수입을 얻었다.";
    rewardText = "+15G";
  } else if (card.id === "lucky_shoal"){
    player.gold += 20;
    extraNote = " 물고기 떼를 팔아 부수입을 얻었다.";
    rewardText = "+20G";
  } else if (card.id === "rare_ether_current"){
    fuelCost = 0;
    foodCost = 0;
    extraNote = " 에테르 해류를 타고 연료와 식량 소모 없이 나아갔다.";
  } else if (card.type === "treasure"){
    const lootDesc = rollTreasureChestLoot();
    extraNote = ` 보물상자를 열어 ${lootDesc}을(를) 얻었다.`;
    rewardText = lootDesc;
  }

  if (!rewardText && !damageText){
    if (card.type === "bonus") rewardText = "행운의 사건";
    else if (card.type === "hazard") damageText = "위험한 사건";
  }

  const fuelSaveChance = (player.waterFuelSaveChance || 0) + getCrewEffectValue("fuel_save_chance");
  if (fuelCost > 0 && fuelSaveChance > 0 && Math.random() < fuelSaveChance){
    fuelCost = 0;
    extraNote += " 동료/사주의 기운이 연료 소모를 막아줬다.";
  }

  const finalizeStep = () => {
    player.fuel = Math.max(0, player.fuel - fuelCost);
    player.food = Math.max(0, player.food - foodCost);
    voyage.remaining -= 1;

    log("항해 사건", `[${card.name}] ${card.desc}${extraNote}`);
    renderGauges();

    if ((player.fuel <= 0 || player.food <= 0) && voyage.remaining > 0){
      voyage.distressed = true;
      log("항해일지", `연료 또는 식량이 완전히 바닥났다. 목적지까지 아직 ${voyage.remaining}칸이 남은 채로 배가 표류하기 시작한다 — 조난 상태.`);
    }

    renderVoyagePanel();
  };

  if (rewardText){
    showTreasureEffect(rewardText, finalizeStep);
  } else if (damageText){
    showDamageEffect(damageText, finalizeStep);
  } else {
    finalizeStep();
  }
}

function applyStepMovementCost(){
  const fuelSaveChance = (player.waterFuelSaveChance || 0) + getCrewEffectValue("fuel_save_chance");
  let fuelCost = 3;
  if (fuelSaveChance > 0 && Math.random() < fuelSaveChance) fuelCost = 0;
  const foodCost = 1 + ship.crew.length;
  player.fuel = Math.max(0, player.fuel - fuelCost);
  player.food = Math.max(0, player.food - foodCost);
  voyage.remaining -= 1;
  renderGauges();
  if ((player.fuel <= 0 || player.food <= 0) && voyage.remaining > 0){
    voyage.distressed = true;
  }
}

/* 잠금 상태를 보여주는 버튼 공통 헬퍼 — 조건 미달이면 필요 수치를 그대로 노출한다 */
function gateButtonHTML(id, label, currentValue, requiredValue, extraClass){
  const locked = currentValue < requiredValue;
  return `<button class="mini-btn ${extraClass || ""}" id="${id}" ${locked ? "disabled" : ""}>${locked ? `🔒 ${label} (필요 ${requiredValue}, 현재 ${currentValue})` : label}</button>`;
}

/* 선택지 + 주사위가 필요한 이벤트 카드 — 이동 비용을 먼저 소모한 뒤 선택 화면을 띄운다 */
function openVoyageEventChoice(card){
  applyStepMovementCost();
  activePanel = "special-" + card.type;
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-close").style.display = "none";
  renderVoyageEventChoice(card);
}

function renderVoyageEventChoice(card){
  const body = document.getElementById("panel-body");
  document.getElementById("panel-title-text").textContent = card.name;

  if (card.type === "auction"){
    const affordable = player.gold >= 100;
    body.innerHTML = `
      <div style="font-size:12.5px;color:var(--parchment-dim);margin-bottom:12px;">${card.desc} 참가하려면 100G와 뒷세계에서의 신뢰(악명)가 필요하다.</div>
      ${gateButtonHTML("auction-join", `경매에 참가한다 (100G)${affordable ? "" : " · 골드 부족"}`, player.notoriety, GATE_LOW)}
      <button class="mini-btn sell" id="auction-skip">지나친다</button>
    `;
    const joinBtn = document.getElementById("auction-join");
    if (!joinBtn.disabled && !affordable) joinBtn.disabled = true;
    joinBtn.addEventListener("click", () => resolveAuction(true));
    document.getElementById("auction-skip").addEventListener("click", () => resolveAuction(false));

  } else if (card.type === "wreck"){
    body.innerHTML = `
      <div style="font-size:12.5px;color:var(--parchment-dim);margin-bottom:12px;">${card.desc}</div>
      ${gateButtonHTML("wreck-share", "식량을 나눈다", player.fame, GATE_MID)}
      ${gateButtonHTML("wreck-loot", "약탈한다", player.notoriety, GATE_MID, "sell")}
      <div><button class="mini-btn" id="wreck-skip">그냥 지나친다</button></div>
    `;
    document.getElementById("wreck-share").addEventListener("click", () => resolveWreck("share"));
    document.getElementById("wreck-loot").addEventListener("click", () => resolveWreck("loot"));
    document.getElementById("wreck-skip").addEventListener("click", () => resolveWreck("skip"));

  } else if (card.type === "storm"){
    body.innerHTML = `
      <div style="font-size:12.5px;color:var(--parchment-dim);margin-bottom:12px;">${card.desc} 주사위(2D6) 합계 8 이상이 나와야 무사히 통과한다.</div>
      <button class="mini-btn" id="storm-roll">돌파를 시도한다</button>
    `;
    document.getElementById("storm-roll").addEventListener("click", resolveStorm);

  } else if (card.type === "ghost"){
    body.innerHTML = `
      <div style="font-size:12.5px;color:var(--parchment-dim);margin-bottom:12px;">${card.desc}</div>
      <button class="mini-btn" id="ghost-fight">도전한다 (2D6 합계 11 이상 대성공)</button>
      <button class="mini-btn sell" id="ghost-avoid">피한다 (명성 -1)</button>
    `;
    document.getElementById("ghost-fight").addEventListener("click", () => resolveGhost("fight"));
    document.getElementById("ghost-avoid").addEventListener("click", () => resolveGhost("avoid"));

  } else if (card.type === "combat"){
    body.innerHTML = `
      <div style="font-size:12.5px;color:var(--parchment-dim);margin-bottom:12px;">${card.desc} 2D6 + 함포 보정 + 동료 보정으로 판정한다. (8 이상 승리 / 11 이상 대성공 / 7 이하 패배)</div>
      <button class="mini-btn" id="combat-fight">교전한다</button>
      <button class="mini-btn sell" id="combat-flee">도주한다 (명성 -2, 연료 1 추가 소모)</button>
    `;
    document.getElementById("combat-fight").addEventListener("click", () => resolveCombat("fight"));
    document.getElementById("combat-flee").addEventListener("click", () => resolveCombat("flee"));
  }
}

function resolveAuction(participate){
  if (!participate){
    log("항해일지", "은밀한 경매를 그냥 지나쳤다.");
    afterSpecialEvent();
    return;
  }
  if (player.gold < 100 || player.notoriety < GATE_LOW){
    log("경매 진행자", "\"참가 자격이 안 되는구려.\"");
    afterSpecialEvent();
    return;
  }
  player.gold -= 100;

  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  const total = d1 + d2;
  const success = total >= 7;
  const resultLabel = success ? "낙찰 성공!" : "낙찰 실패";
  const resultColor = success ? "var(--teal-light)" : "var(--rust-light)";

  showDiceRollEffect([d1, d2], `합계 ${total}`, resultLabel, resultColor, () => {
    if (success){
      const rareGoods = ["마정석", "진주", "증기기관부품", "무기"];
      const reward = rareGoods[Math.floor(Math.random() * rareGoods.length)];
      const holding = ship.cargo[reward] || 0;
      if (ship.cargoUsed < ship.cargoSlots){
        ship.cargo[reward] = holding + 1;
        ship.cargoUsed += 1;
        log("경매 진행자", `낙찰 성공! (합계 ${total}) 고급 무역품 [${reward}] 1개를 손에 넣었다.`);
      } else {
        player.gold += 60;
        log("경매 진행자", `낙찰은 성공했지만 (합계 ${total}) 화물칸이 없어 대신 60G로 환전받았다.`);
      }
    } else {
      log("경매 진행자", `"아쉽게 됐군." (합계 ${total}) 낙찰에 실패해 100G만 날렸다.`);
    }
    renderGauges(); renderShipStats();
    afterSpecialEvent();
  });
}

function resolveWreck(choice){
  if (choice === "share" && player.fame < GATE_MID){ afterSpecialEvent(); return; }
  if (choice === "loot" && player.notoriety < GATE_MID){ afterSpecialEvent(); return; }

  if (choice === "share"){
    player.food += 2;
    player.reputation.empire += 10;
    player.vp += 5;
    log("항해일지", "표류자들에게 식량을 나눠줬다. 제국 평판이 오르고 명예 점수(VP) 5를 얻었다.");
  } else if (choice === "loot"){
    player.gold += 500;
    player.reputation.empire -= 15;
    log("항해일지", "가차 없이 수송선을 약탈했다. 500G를 챙겼지만 제국의 평판이 크게 떨어졌다.");
  } else {
    log("항해일지", "난파선을 그대로 지나쳤다.");
  }
  renderGauges(); renderShipStats();
  afterSpecialEvent();
}

function resolveStorm(){
  const penalty = isHullBelowHalf() ? -1 : 0;
  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  const roll = d1 + d2 + penalty;
  let mitigated = false;
  if (roll < 8 && player.failureMitigation){
    mitigated = true;
    player.failureMitigation = false;
  }

  const success = roll >= 8 || mitigated;
  const resultLabel = success ? (mitigated ? "위기 극복!" : "성공 — 무사통과") : "실패 — 피해 발생";
  const resultColor = success ? "var(--teal-light)" : "var(--rust-light)";

  showDiceRollEffect([d1, d2], `합계 ${roll}`, resultLabel, resultColor, () => {
    if (success){
      log("항해일지", `에테르 폭풍우 속에서 주사위 합계 ${roll}${penalty ? " (내구도 저하 페널티 적용)" : ""}이 나왔다. ${mitigated ? "동료의 도움으로 위기를 넘겼다." : "능숙하게 폭풍을 뚫고 나갔다."}`);
    } else {
      player.fuel = Math.max(0, player.fuel - 2);
      ship.hullDamage += 10;
      log("항해일지", `에테르 폭풍우 속에서 주사위 합계 ${roll}${penalty ? " (내구도 저하 페널티 적용)" : ""}이 나와 실패했다. 연료 2를 잃고 선체 내구도가 손상됐다.`);
    }
    renderGauges(); renderShipStats();
    afterSpecialEvent();
  });
}

function resolveCombat(action){
  if (action === "flee"){
    player.fuel = Math.max(0, player.fuel - 1);
    player.fame = Math.max(0, player.fame - 2);
    log("항해일지", "전투를 피해 황급히 달아났다. 연료 1을 추가로 소모하고 명성이 2 떨어졌다.");
    renderGauges(); renderShipStats();
    afterSpecialEvent();
    return;
  }

  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  const combatBonus = getCombatBonus();
  const crewCombatBonus = getCrewEffectValue("combat_bonus");
  const elementBonus = player.combatDiceBonus || 0;
  const penalty = isHullBelowHalf() ? -1 : 0;
  const total = d1 + d2 + combatBonus + crewCombatBonus + elementBonus + penalty;
  const greatThreshold = player.combatGreatSuccessThreshold || 11;
  const rollNote = `주사위 ${d1}+${d2} + 함포 보정 ${combatBonus} + 동료 보정 ${crewCombatBonus} + 화(火) 보정 ${elementBonus}${penalty ? " - 내구도 페널티 1" : ""} = ${total}`;

  const stealLoot = () => {
    if (!hasCrewEffect("loot_steal")) return "";
    const loot = ["석탄", "약초", "실크", "진주"][Math.floor(Math.random() * 4)];
    const holding = ship.cargo[loot] || 0;
    if (ship.cargoUsed < ship.cargoSlots){
      ship.cargo[loot] = holding + 1;
      ship.cargoUsed += 1;
      return ` 동료가 상대 화물 [${loot}] 1개를 탈취했다.`;
    }
    return "";
  };

  let resultLabel, resultColor;
  if (total >= greatThreshold){ resultLabel = "대성공!"; resultColor = "var(--brass-light)"; }
  else if (total >= 8){ resultLabel = "성공 — 승리"; resultColor = "var(--teal-light)"; }
  else { resultLabel = "실패 — 패배"; resultColor = "var(--rust-light)"; }

  showDiceRollEffect([d1, d2], `합계 ${total}`, resultLabel, resultColor, () => {
    if (total >= greatThreshold){
      player.gold += 80;
      player.fame += 5;
      player.notoriety += 3;
      player.vp += 15;
      let purgeNote = "";
      const hazardIdx = DECK.findIndex(c => c.type === "hazard");
      if (hazardIdx !== -1){
        const purged = DECK.splice(hazardIdx, 1)[0];
        purgeNote = ` 위협적인 항로 카드 [${purged.name}]을(를) 덱에서 영구히 파기했다.`;
      }
      log("전투", `대성공! (${rollNote}, 기준 ${greatThreshold}+) 적을 완파하고 전리품 80G를 얻었다. 명성 +5, 악명 +3, VP +15.${purgeNote}${stealLoot()}`);
    } else if (total >= 8){
      player.gold += 80;
      player.notoriety += 2;
      player.vp += 8;
      log("전투", `승리! (${rollNote}) 적을 물리치고 전리품 80G를 얻었다. 악명 +2, VP +8.${stealLoot()}`);
    } else {
      ship.hullDamage += 20;
      const lost = Math.min(100, player.gold);
      player.gold -= lost;
      log("전투", `패배... (${rollNote}) 선체 내구도 20을 잃고 금화 ${lost}G를 약탈당했다.`);
    }

    renderGauges(); renderShipStats();
    afterSpecialEvent();
  });
}

function resolveGhost(choice){
  if (choice === "avoid"){
    player.fame = Math.max(0, player.fame - 1);
    log("항해일지", "안개 속으로 사라지는 유령선을 애써 피했다. 명성이 1 떨어졌다.");
    renderGauges(); renderShipStats();
    afterSpecialEvent();
    return;
  }

  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  const total = d1 + d2;
  const resultLabel = total >= 11 ? "대성공!" : "실패";
  const resultColor = total >= 11 ? "var(--brass-light)" : "var(--rust-light)";

  showDiceRollEffect([d1, d2], `합계 ${total}`, resultLabel, resultColor, () => {
    if (total >= 11){
      BOARD.push({
        id: "ghost_treasure_" + Date.now(), name: "유령선의 보물", type: "achievement",
        desc: "유령선 오디세이에서 얻은 전설적인 보물. 연말 집계 시 VP로 환산된다.", vp: 20,
      });
      log("항해일지", `전투 주사위 합계 ${total} — 대성공! 유령선을 정복하고 [업적 카드: 유령선의 보물](20VP)을 손에 넣었다.`);
    } else {
      log("항해일지", `전투 주사위 합계 ${total} — 유령선과의 조우에서 아무 소득 없이 물러났다.`);
    }
    renderShipStats();
    afterSpecialEvent();
  });
}

function afterSpecialEvent(){
  document.getElementById("panel-close").style.display = "";
  closePanel();
  if (voyage && voyage.distressed){
    log("항해일지", "연료 또는 식량이 완전히 바닥났다. 배가 표류하기 시작한다 — 조난 상태.");
  }
  renderVoyagePanel();
}

/* ===== 조난 상태 — 2D6 합계 10 이상이면 희생 없이 통과, 실패하면 카드/동료를 희생해야 전진 가능 ===== */
function attemptDistressStep(){
  if (!voyage || !voyage.distressed) return;

  if (player.firstDistressFree){
    player.firstDistressFree = false;
    voyage.remaining -= 1;
    if (voyage.remaining <= 0) voyage.distressed = false;
    log("항해일지", "물(水)의 기운이 도와 첫 위기를 대가 없이 넘겼다. 배가 한 칸 더 나아간다.");
    renderVoyagePanel();
    return;
  }

  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  const total = d1 + d2;
  const resultLabel = total >= 10 ? "위기 극복!" : "판정 실패";
  const resultColor = total >= 10 ? "var(--teal-light)" : "var(--rust-light)";

  showDiceRollEffect([d1, d2], `합계 ${total}`, resultLabel, resultColor, () => {
    if (total >= 10){
      voyage.remaining -= 1;
      if (voyage.remaining <= 0) voyage.distressed = false;
      log("항해일지", `조난 극복 판정 성공 (합계 ${total})! 아무것도 희생하지 않고 한 칸 나아간다.`);
      renderVoyagePanel();
      return;
    }

    log("항해일지", `조난 극복 판정 실패 (합계 ${total}). 무언가를 희생해야 한다.`);
    if (HAND.length === 0 && ship.crew.length === 0){
      shipwreck();
      return;
    }
    openDistressChoicePanel();
  });
}

function openDistressChoicePanel(){
  activePanel = "distress";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-title-text").textContent = "조난 — 희생을 선택하라";
  renderDistressChoicePanel();
}

function renderDistressChoicePanel(){
  const body = document.getElementById("panel-body");
  let html = `<div style="font-size:12.5px;color:var(--parchment-dim);margin-bottom:12px;">
    연료와 식량이 모두 바닥났다. 배를 가볍게 하거나 인원을 줄여야 앞으로 나아갈 수 있다.</div>`;

  html += `<div style="margin-bottom:12px;">
    <div class="section-label" style="text-align:left;">손패 카드 1장 버리기</div>`;
  html += HAND.length
    ? HAND.map((c, i) => `<button class="mini-btn" data-type="card" data-idx="${i}" style="margin:2px 6px 2px 0;">${c.name}</button>`).join("")
    : `<div style="font-size:11.5px;color:var(--parchment-dim);">버릴 카드가 없다.</div>`;
  html += `</div>`;

  html += `<div>
    <div class="section-label" style="text-align:left;">동료 1명 해고하기</div>`;
  html += ship.crew.length
    ? ship.crew.map((c, i) => `<button class="mini-btn sell" data-type="crew" data-idx="${i}" style="margin:2px 6px 2px 0;">${c.name}</button>`).join("")
    : `<div style="font-size:11.5px;color:var(--parchment-dim);">해고할 동료가 없다.</div>`;
  html += `</div>`;

  body.innerHTML = html;
  body.querySelectorAll(".mini-btn").forEach(btn => {
    btn.addEventListener("click", () => resolveDistressChoice(btn.dataset.type, parseInt(btn.dataset.idx, 10)));
  });
}

function resolveDistressChoice(type, idx){
  if (type === "card"){
    const card = HAND.splice(idx, 1)[0];
    if (!card) return;
    log("항해일지", `[${card.name}]을(를) 바다에 던져 배를 가볍게 했다. 겨우 한 칸을 더 나아간다.`);
  } else {
    const companion = ship.crew.splice(idx, 1)[0];
    if (!companion) return;
    ship.crewUsed = ship.crew.length;
    log("항해일지", `${companion.name}이(가) 구명정을 타고 선단을 떠났다. 배가 한 칸을 더 나아간다.`);
  }

  closePanel();
  voyage.remaining -= 1;
  if (voyage.remaining <= 0) voyage.distressed = false; // 도착하면 조난 상태를 해제한다
  renderGauges();
  renderShipStats();
  renderVoyagePanel();
}

function shipwreck(){
  const lost = Math.round(player.gold * 0.5);
  player.gold -= lost;
  log("항해일지", `버릴 카드도, 떠날 동료도 남지 않았다 — 배가 난파되었다! 금화 ${lost}G를 잃고 표류 끝에 기어헤븐으로 떠밀려간다.`);

  voyage = null;
  document.getElementById("voyage-box").classList.remove("open");
  document.getElementById("voyage-box").innerHTML = "";
  player.location = "기어헤븐";
  turnActionsUsed = 0;
  market.commitAllPending();

  renderPortInfo();
  renderGauges();
  renderShipStats();
  renderTurnCounter();
  renderTownActions();
  renderMinorActions();
  runRivalCompanyTurn();
  advanceMonth();
  takeTurnSnapshot();
  saveGame();
}

/* ===== 목적지 입항 게이트 — 세력 평판 / 악명 ===== */
function factionKey(faction){
  switch (faction){
    case "증기 제국": return "empire";
    case "연금술사 연합": return "union";
    case "자유 상인 연맹": return "merchants";
    case "무법자 & 심해 부족": return "outlaws";
    default: return "empire";
  }
}

function renderArrivalGate(){
  const box = document.getElementById("voyage-box");
  const port = PORTS.find(p => p.id === voyage.destination);
  const key = factionKey(port.faction);
  const rep = player.reputation[key];
  let hostile = rep <= -50;
  const allied = rep >= 50;
  const infamyHigh = player.notoriety >= 50;
  const isOutlawCity = key === "outlaws";

  const notes = [];
  if (hostile && player.ignoreNextEntryDenial){
    player.ignoreNextEntryDenial = false;
    hostile = false;
    notes.push(`${port.faction}이(가) 적대시하지만, 퇴역 해군 제독의 위신 덕에 거부를 무시하고 입항한다.`);
  } else if (hostile){
    notes.push(`${port.faction}은(는) 당신을 적대시한다 (평판 ${rep}). 뇌물 100G 없이는 입항할 수 없다.`);
  }
  if (allied) notes.push(`${port.faction}은(는) 당신을 동맹으로 여긴다 (평판 ${rep}). 이 항구의 매매에서 10% 추가 이득을 얻는다.`);
  if (infamyHigh && isOutlawCity) notes.push(`악명이 높아 입항료가 면제되고 이 항구의 암시장을 이용할 수 있다.`);
  if (infamyHigh && !isOutlawCity && (key === "empire" || key === "merchants")) notes.push(`악명이 높다는 이유로 이 항구에서 50G의 벌금이 부과될 것이다.`);

  box.innerHTML = `
    <div class="voyage-heading"><b>${voyage.destination}</b> 앞바다에 도착했다.</div>
    <div class="voyage-steps">${renderVoyageSteps()}</div>
    ${notes.length ? `<div class="distress-banner" style="border-color:var(--brass-dim);border-left-color:var(--teal-light);color:var(--parchment-dim);">${notes.join("<br>")}</div>` : ""}
    <div class="voyage-controls">
      ${hostile
        ? `<button class="action-btn" id="btn-bribe" ${player.gold < 100 ? "disabled" : ""}><span>뇌물을 지불하고 입항한다</span><span class="tag">100G</span></button>`
        : `<button class="action-btn sail-btn" id="btn-arrive"><span>정박한다</span><span class="tag">마을 단계로 진입</span></button>`
      }
    </div>
  `;

  if (hostile){
    document.getElementById("btn-bribe").addEventListener("click", () => {
      if (player.gold < 100) return;
      player.gold -= 100;
      log("항구 경비대", "\"뇌물을 받았으니 눈감아 주지.\" 100G를 지불하고 입항했다.");
      finalizeArrival();
    });
  } else {
    document.getElementById("btn-arrive").addEventListener("click", finalizeArrival);
  }
}

function finalizeArrival(){
  const port = PORTS.find(p => p.id === voyage.destination);
  const key = factionKey(port.faction);
  if (player.notoriety >= 50 && (key === "empire" || key === "merchants")){
    const fine = Math.min(50, player.gold);
    player.gold -= fine;
    log("항구 세관", `악명이 높다는 이유로 ${fine}G의 벌금을 물었다.`);
  }
  arriveAtPort();
}

function arriveAtPort(){
  const traveledDistance = voyage.total;
  player.location = voyage.destination;
  voyage = null;
  document.getElementById("voyage-box").classList.remove("open");
  document.getElementById("voyage-box").innerHTML = "";
  turnActionsUsed = 0;

  const voyageVP = Math.max(1, Math.round(traveledDistance / 3));
  player.vp += voyageVP;
  market.commitAllPending();

  renderPortInfo();
  renderGauges();
  renderShipStats();
  renderTurnCounter();
  renderTownActions();
  renderMinorActions();
  log("항해일지", `${player.location}에 무사히 정박했다. 항해 거리 ${traveledDistance}칸으로 VP +${voyageVP}를 얻었다. 새로운 턴이 시작된다.`);
  runRivalCompanyTurn();
  advanceMonth();
  takeTurnSnapshot();
  saveGame();
}

/* ===== 연말(12월) VP 결산 ===== */
function advanceMonth(){
  player.month += 1;
  if (player.month > 12){
    openYearEndPopup();
  }
}

function calculateVP(){
  const goldVP = Math.floor(player.gold / 100);
  const cityShareVP = player.investedCities.length * 10;
  const influenceVP = player.influenceWins * 15;
  const cardVP = getTotalVP();
  const alliedCount = FACTION_ROWS.filter(r => player.reputation[r.key] >= 50).length;
  const allianceVP = alliedCount * 15;
  return {
    goldVP, cityShareVP, influenceVP, cardVP, allianceVP, alliedCount,
    total: goldVP + cityShareVP + influenceVP + cardVP + allianceVP,
  };
}

function rankForVP(total){
  if (total >= 150) return { rank:"S", text:"전설이 된 무역상 — 당신의 이름이 다섯 세력 모두의 장부에 금빛으로 새겨졌다." };
  if (total >= 110) return { rank:"A", text:"존경받는 대상인 — 어느 항구를 가도 당신의 깃발을 반긴다." };
  if (total >= 70)  return { rank:"B", text:"이름 있는 선장 — 그럭저럭 자리를 잡은 한 해였다." };
  return { rank:"C", text:"근근이 버틴 한 해 — 다음 항해엔 더 나은 결과를 기대해본다." };
}

function openYearEndPopup(){
  const v = calculateVP();
  const { rank, text } = rankForVP(v.total);
  activePanel = "yearend";
  document.getElementById("panel-box").classList.add("open");
  document.getElementById("panel-close").style.display = "none";
  document.getElementById("panel-title-text").textContent = "1년 결산 — 12월";
  document.getElementById("panel-body").innerHTML = `
    <div style="margin-bottom:14px;">
      <div class="simple-stat"><span>금화 환산 (금화 ÷ 100)</span><b>${v.goldVP}</b></div>
      <div class="simple-stat"><span>도시 지분 마커 (${player.investedCities.length}개 × 10)</span><b>${v.cityShareVP}</b></div>
      <div class="simple-stat"><span>영향력 경쟁 승리 (${player.influenceWins}회 × 15)</span><b>${v.influenceVP}</b></div>
      <div class="simple-stat"><span>카드 / 사건 VP</span><b>${v.cardVP}</b></div>
      <div class="simple-stat"><span>동맹 세력 (${v.alliedCount}개 × 15)</span><b>${v.allianceVP}</b></div>
      <div class="stat-divider"></div>
      <div class="simple-stat"><span>총 VP</span><b style="color:var(--brass-light);font-size:16px;">${v.total}</b></div>
    </div>
    <div style="font-family:'Cinzel', serif; font-size:24px; color:var(--brass-light); text-align:center; margin:10px 0;">${rank} 랭크</div>
    <div style="font-size:12.5px; color:var(--parchment-dim); text-align:center; margin-bottom:16px;">${text}</div>
    <button class="mini-btn" id="yearend-confirm">새로운 해를 시작한다</button>
  `;
  document.getElementById("yearend-confirm").addEventListener("click", () => {
    player.month = 1;
    document.getElementById("panel-close").style.display = "";
    closePanel();
    renderGauges(); renderShipStats();
    saveGame();
  });
}

/* =========================================================================
   저장 / 불러오기 — localStorage(오프라인) + Supabase(클라우드) 이중 저장
   ========================================================================= */
const SAVE_KEY = "aqua_mechanica_save_v1";

// 배포 전 아래 두 값을 Supabase 프로젝트 값으로 채워주세요 (Project Settings -> API).
// ANON KEY는 공개되어도 안전한 값입니다 (RLS로 보호됨). SERVICE ROLE KEY는 여기 넣지 마세요.
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";

let supabaseClient = null;
let supabaseSession = null;

function initSupabase(){
  const statusEl = document.getElementById("cloud-sync-status");
  if (!window.supabase || SUPABASE_URL.includes("YOUR-PROJECT")){
    if (statusEl) statusEl.textContent = "클라우드 저장: 설정 안 됨 (로컬 저장만 사용)";
    return;
  }
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  supabaseClient.auth.getSession().then(({ data }) => {
    supabaseSession = data.session;
    updateCloudSyncStatus();
  });

  supabaseClient.auth.onAuthStateChange((_event, session) => {
    supabaseSession = session;
    updateCloudSyncStatus();
  });
}

function updateCloudSyncStatus(){
  const el = document.getElementById("cloud-sync-status");
  if (!el) return;
  el.textContent = supabaseSession
    ? `클라우드 저장: ${supabaseSession.user.email} 로그인됨`
    : "클라우드 저장: 로그인 안 됨 (로컬 저장만 사용 중)";
}

async function requestLoginLink(){
  const statusEl = document.getElementById("cloud-sync-status");
  if (!supabaseClient){
    if (statusEl) statusEl.textContent = "클라우드 저장: 설정 안 됨 (index.html 상단 SUPABASE_URL/ANON_KEY 확인)";
    return;
  }
  const email = document.getElementById("cloud-email").value.trim();
  if (!email) return;
  const { error } = await supabaseClient.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin },
  });
  if (statusEl){
    statusEl.textContent = error
      ? `오류: ${error.message}`
      : `${email}로 로그인 링크를 보냈습니다. 메일함을 확인하세요.`;
  }
}

async function cloudSave(){
  if (!supabaseSession) return;
  try {
    await fetch("/api/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${supabaseSession.access_token}`,
      },
      body: serializeState(),
    });
  } catch (e){
    console.warn("클라우드 저장 실패 (로컬 저장은 정상 동작):", e);
  }
}

async function cloudLoad(){
  if (!supabaseSession) return null;
  try {
    const res = await fetch("/api/load", {
      headers: { "Authorization": `Bearer ${supabaseSession.access_token}` },
    });
    if (!res.ok) return null;
    const json = await res.json();
    return json.state || null;
  } catch (e){
    console.warn("클라우드 불러오기 실패 (로컬 저장으로 대체):", e);
    return null;
  }
}

function serializeState(){
  return JSON.stringify({
    player, ship, HAND, BOARD, DECK, selectedCompanionId, turnActionsUsed,
    marketMatrices: market.matrices, cityState: CITY_STATE,
    rareItemInventory: RARE_ITEM_INVENTORY, discoveredItems: DISCOVERED_ITEMS,
  });
}

function saveGame(){
  try {
    localStorage.setItem(SAVE_KEY, serializeState());
  } catch (e){
    console.warn("저장 실패 (브라우저 저장소에 접근할 수 없음):", e);
  }
  cloudSave(); // 로그인 상태라면 함께 백업. 실패해도 로컬 저장은 이미 완료된 상태.
}

function loadGame(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e){
    return null;
  }
}

function hasSaveGame(){
  try { return !!localStorage.getItem(SAVE_KEY); } catch (e){ return false; }
}

function applyLoadedState(data){
  Object.assign(player, data.player);
  ship.cargoSlots = data.ship.cargoSlots;
  ship.cargoUsed = data.ship.cargoUsed;
  ship.crewSlots = data.ship.crewSlots;
  ship.crewUsed = data.ship.crewUsed;
  ship.cargo = data.ship.cargo || {};
  ship.cargoCost = data.ship.cargoCost || {};
  ship.crew = data.ship.crew || [];
  ship.tracks = data.ship.tracks || ship.tracks;
  ship.hullDamage = data.ship.hullDamage || 0;

  HAND.length = 0; (data.HAND || []).forEach(c => HAND.push(c));
  BOARD.length = 0; (data.BOARD || []).forEach(c => BOARD.push(c));
  DECK.length = 0; (data.DECK || []).forEach(c => DECK.push(c));

  RARE_ITEM_INVENTORY.length = 0; (data.rareItemInventory || []).forEach(c => RARE_ITEM_INVENTORY.push(c));
  DISCOVERED_ITEMS.length = 0; (data.discoveredItems || []).forEach(id => DISCOVERED_ITEMS.push(id));

  selectedCompanionId = data.selectedCompanionId;
  turnActionsUsed = data.turnActionsUsed || 0;

  if (data.marketMatrices){
    Object.keys(data.marketMatrices).forEach(portId => {
      if (!market.matrices[portId]) return;
      const table = data.marketMatrices[portId];
      Object.keys(table).forEach(goodName => {
        const g = table[goodName];
        market.matrices[portId][goodName] = new TradeGood(goodName, g.qtyLevel, g.priceLevel);
      });
    });
  }

  if (data.cityState){
    Object.keys(data.cityState).forEach(portId => {
      if (!CITY_STATE[portId]) return;
      CITY_STATE[portId].level = data.cityState[portId].level || 1;
      CITY_STATE[portId].influence = data.cityState[portId].influence || {};
      CITY_STATE[portId].lastPlacedBy = data.cityState[portId].lastPlacedBy || null;
    });
  }
}

async function continueGame(){
  // 로그인 상태라면 클라우드 저장분을 우선 시도하고, 없으면 로컬 저장으로 대체한다.
  let data = supabaseSession ? await cloudLoad() : null;
  if (!data) data = loadGame();
  if (!data) return;
  applyLoadedState(data);

  document.getElementById("title-screen").style.display = "none";
  document.getElementById("companion-select").style.display = "none";
  document.getElementById("game-screen").style.display = "block";

  renderPortInfo();
  renderGauges();
  renderShipStats();
  renderTurnCounter();
  renderTownActions();
  renderMinorActions();
  renderProfileBar();
  takeTurnSnapshot();
  showFloatingStatusButton();
  log("항해일지", "이전 항해 기록을 불러왔다. 항해를 계속한다.");
}

document.getElementById("panel-close").addEventListener("click", closePanel);
document.getElementById("status-modal-close").addEventListener("click", () => toggleStatusModal(false));
document.getElementById("btn-open-status").addEventListener("click", () => toggleStatusModal());
document.getElementById("status-modal-overlay").addEventListener("click", (e) => {
  if (e.target.id === "status-modal-overlay") toggleStatusModal(false);
});
document.getElementById("hand-modal-close").addEventListener("click", () => toggleHandModal(false));
document.getElementById("btn-open-hand").addEventListener("click", () => toggleHandModal());
document.getElementById("hand-modal-overlay").addEventListener("click", (e) => {
  if (e.target.id === "hand-modal-overlay") toggleHandModal(false);
});
document.getElementById("log-history-close").addEventListener("click", () => toggleLogHistory(false));
document.getElementById("btn-log-history").addEventListener("click", () => toggleLogHistory());
document.getElementById("log-history-overlay").addEventListener("click", (e) => {
  if (e.target.id === "log-history-overlay") toggleLogHistory(false);
});
document.getElementById("btn-undo-turn").addEventListener("click", undoTurnActions);

document.getElementById("btn-floating-status").addEventListener("click", () => toggleFloatingStatus());

/* =========================================================================
   5. 게임 시작
   ========================================================================= */
function startGame(){
  const companion = COMPANIONS.find(c => c.id === selectedCompanionId);
  ship.crew.push(companion);
  ship.crewUsed = ship.crew.length;

  document.getElementById("companion-select").style.display = "none";
  document.getElementById("game-screen").style.display = "block";

  renderPortInfo();
  renderGauges();
  renderShipStats();
  renderTurnCounter();
  renderTownActions();
  renderMinorActions();
  renderProfileBar();

  const title = getAddressTitle();
  const opening = player.originText
    ? `${companion.name}이(가) 선단에 합류했다. ${player.name} ${title}, ${ELEMENT_LABEL[player.element]} 사주와 ${player.zodiac.name}(${ZODIAC_GROUP_LABEL[player.zodiac.group]}의 기운)의 도움을 받아 기어헤븐에서 첫 항해를 시작합니다.`
    : `${companion.name}이(가) 선단에 합류했다. 기어헤븐 선착장에 첫 발을 디딘다.`;
  log("항해일지", opening);
  takeTurnSnapshot();
  showFloatingStatusButton();
  saveGame();
}

renderIntroLog();
renderCompanionGrid();
populateHourSelect();
initSupabase();

if (hasSaveGame()){
  document.getElementById("btn-continue").style.display = "inline-block";
}

document.getElementById("cloud-login-btn").addEventListener("click", requestLoginLink);

// 클라우드 세션이 뒤늦게 확인되면(매직 링크로 돌아온 경우 등) 이어서 하기 버튼을 노출한다.
let _continueBtnWatchTries = 0;
const _continueBtnWatcher = setInterval(() => {
  _continueBtnWatchTries += 1;
  if (supabaseSession){
    document.getElementById("btn-continue").style.display = "inline-block";
    clearInterval(_continueBtnWatcher);
  } else if (_continueBtnWatchTries > 60){
    clearInterval(_continueBtnWatcher); // 30초 후 포기 (로그인 안 한 경우)
  }
}, 500);

document.getElementById("btn-to-companion").addEventListener("click", () => {
  document.getElementById("title-screen").style.display = "none";
  document.getElementById("character-creation").style.display = "block";
});
document.getElementById("btn-continue").addEventListener("click", continueGame);

document.getElementById("btn-cc-next").addEventListener("click", () => {
  finalizeCharacterCreation();
  document.getElementById("character-creation").style.display = "none";
  document.getElementById("character-briefing").style.display = "block";
  renderBriefing();
});

document.getElementById("btn-briefing-next").addEventListener("click", () => {
  document.getElementById("character-briefing").style.display = "none";
  document.getElementById("companion-select").style.display = "block";
});

function populateHourSelect(){
  const sel = document.getElementById("cc-hour");
  for (let h = 0; h < 24; h++){
    const opt = document.createElement("option");
    opt.value = h;
    opt.textContent = `${h}시`;
    if (h === 12) opt.selected = true;
    sel.appendChild(opt);
  }
}

document.getElementById("btn-start-game").addEventListener("click", startGame);
</script>
